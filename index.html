<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FIFA World Cup 2026 — Qualified Nations Dashboard</title>
<meta name="description" content="An unofficial interactive map dashboard of all 48 FIFA World Cup 2026 nations — live standings, a knockout bracket, squad-league charts, population and fun facts. GIS × football." />
<meta property="og:title" content="FIFA World Cup 2026 — Qualified Nations Map Dashboard" />
<meta property="og:description" content="All 48 nations on an interactive world map: live standings, a knockout bracket over a greyed globe, squad-league charts and fun facts." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://ponienc.github.io/wc2026_dashboard/" />
<meta name="twitter:card" content="summary" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%2316a34a'/%3E%3Ccircle cx='8' cy='8' r='3.4' fill='white'/%3E%3C/svg%3E" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root {
    --bg:#f3f4f6; --panel:#fff; --ink:#1f2933; --muted:#6b7280; --line:#e5e7eb;
    --selected:#f59e0b; --win:#22c55e; --draw:#9ca3af; --loss:#ef4444; --confirmed:#16a34a;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  }
  /* Dark mode — auto by the viewer's local clock; CARTO Dark Matter basemap */
  body.theme-dark{
    --bg:#0b1220; --panel:#161f33; --ink:#e6edf6; --muted:#94a3b8; --line:#2a3650;
    --shadow:0 2px 10px rgba(0,0,0,.5);
  }
  body.theme-dark #map{background:#0a1626;}
  body.theme-dark .group h2, body.theme-dark .mdate{background:#111a2c;}
  body.theme-dark .team{border-bottom-color:#1e2840;}
  body.theme-dark .team:hover, body.theme-dark .mteam.pick:hover, body.theme-dark .lb-row:hover{background:#1a2438;}
  body.theme-dark .team.active, body.theme-dark .mteam.bkactive, body.theme-dark .lb-row.on{background:#2a2413;}
  body.theme-dark .team .num{color:#aeb9cb;}
  body.theme-dark .search, body.theme-dark .badge, body.theme-dark button.btn, body.theme-dark .seg button{background:#0f1830;color:var(--ink);}
  body.theme-dark button.btn:hover{background:#15203a;}
  body.theme-dark .seg button.on{background:#21305a;color:#c7d2fe;}
  body.theme-dark .map-note{background:rgba(16,24,42,.92);}
  body.theme-dark .pill{background:#1e2840;color:#c7d2e0;}
  body.theme-dark .funfact{background:#1a1733;border-color:#2f2a4d;color:#d6d0ee;}
  body.theme-dark .bar-track, body.theme-dark .lb-bar{background:#26324c;}
  body.theme-dark .mteam+.mteam{border-top-color:#1e2840;}
  body.theme-dark .tag{background:#1e2840;color:#aeb9cb;}
  body.theme-dark .wage-ind{color:#fbbf24;}
  body.theme-dark .empty{background:#0f1830;border-color:#2a3650;}
  body.theme-dark .d-head .x{background:#1e2840;color:var(--muted);}
  body.theme-dark .leaflet-bar a{background:#161f33;color:#e6edf6;border-color:#2a3650;}
  body.theme-dark.view-bracket .leaflet-tile-pane{filter:grayscale(0.85) opacity(0.5);}

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       color:var(--ink);background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}

  /* Header */
  header{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:10px 18px;background:var(--panel);
         border-bottom:1px solid var(--line);box-shadow:var(--shadow);z-index:1100;}
  header .title{font-size:17px;font-weight:700;letter-spacing:-.2px;white-space:nowrap;}
  header .title span{color:var(--muted);font-weight:500;}
  header .spacer{flex:1;}
  .badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--muted);
         padding:5px 11px;border:1px solid var(--line);border-radius:999px;background:#fff;white-space:nowrap;}
  .badge .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
  .badge.live .dot{background:var(--win);box-shadow:0 0 0 3px rgba(34,197,94,.18);}
  .badge.mock .dot{background:var(--selected);}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .seg button{font:inherit;font-size:12px;font-weight:600;border:0;background:#fff;color:var(--muted);
              padding:6px 10px;cursor:pointer;}
  .seg button.on{background:#eef2ff;color:#3730a3;}
  /* "new feature" glow on the Travel tab — blinks until first opened (inset so the segment's
     overflow:hidden doesn't clip it). Removed once the viewer has visited Travel. */
  @keyframes tab-new-glow{
    0%,100%{box-shadow:inset 0 0 0 1.5px rgba(99,102,241,.45), inset 0 0 7px rgba(99,102,241,.30);}
    50%    {box-shadow:inset 0 0 0 2px rgba(99,102,241,1), inset 0 0 15px rgba(99,102,241,.85);}}
  .seg button.tab-new{color:#4f46e5;position:relative;z-index:1;animation:tab-new-glow 1.25s ease-in-out infinite;}
  body.theme-dark .seg button.tab-new{color:#a5b4fc;}
  @media (prefers-reduced-motion:reduce){.seg button.tab-new{animation:none;box-shadow:inset 0 0 0 2px rgba(99,102,241,.9);}}
  button.btn{font:inherit;font-size:12px;font-weight:600;cursor:pointer;padding:6px 12px;border-radius:8px;
             border:1px solid var(--line);background:#fff;color:var(--ink);}
  button.btn:hover{background:#f9fafb;border-color:#d1d5db;}

  main{flex:1 1 auto;display:flex;min-height:0;position:relative;}

  /* Sidebar */
  #sidebar{flex:0 0 392px;max-width:392px;background:var(--bg);border-right:1px solid var(--line);
           display:flex;flex-direction:column;min-height:0;}
  .sidebar-tools{padding:12px 14px 8px;}
  .search{width:100%;font:inherit;font-size:13px;padding:9px 12px;border-radius:9px;border:1px solid var(--line);
          background:#fff;outline:none;}
  .search:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.12);}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;padding:6px 14px 10px;font-size:11px;color:var(--muted);}
  .legend .item{display:inline-flex;align-items:center;gap:5px;}
  .ldot{width:9px;height:9px;border-radius:50%;}
  .swatch{width:11px;height:11px;border-radius:3px;}

  #groups{flex:1 1 auto;overflow-y:auto;padding:4px 14px 18px;}
  .group{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;
         box-shadow:var(--shadow);overflow:hidden;}
  .group h2{margin:0;padding:10px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;
            border-bottom:1px solid var(--line);background:#fafafa;}
  .group h2 .chip{width:12px;height:12px;border-radius:3px;flex:0 0 auto;}
  .group h2 .gcount{margin-left:auto;font-size:11px;font-weight:500;color:var(--muted);}
  .thead,.team{display:grid;grid-template-columns:18px 28px 1fr 24px 30px 28px auto;gap:6px;align-items:center;}
  .thead{padding:6px 12px 6px 8px;font-size:10px;color:var(--muted);text-transform:uppercase;
         letter-spacing:.04em;border-bottom:1px solid var(--line);}
  .thead .c{text-align:center;} .thead .r{text-align:right;}
  .team{padding:9px 12px 9px 8px;border-bottom:1px solid #f1f2f4;cursor:pointer;transition:background .12s;
        border-left:3px solid transparent;}
  .team:last-child{border-bottom:0;}
  .team:hover{background:#f7faf8;}
  .team:focus-visible{outline:2px solid #93c5fd;outline-offset:-2px;}
  .team.active{background:#fff7ec;border-left-color:var(--selected);}
  .team .pos{font-size:12px;color:var(--muted);text-align:center;}
  .team .flag{width:26px;height:18px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.08);}
  .team .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .team .num{font-size:12px;text-align:right;color:#374151;font-variant-numeric:tabular-nums;}
  .team .pts{font-weight:700;color:var(--ink);}
  .team .form{display:inline-flex;gap:3px;justify-content:flex-end;}
  .fdot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .fdot.W{background:var(--win);} .fdot.D{background:var(--draw);} .fdot.L{background:var(--loss);}
  .fdot.n{width:9px;height:9px;color:var(--muted);font-size:10px;line-height:9px;text-align:center;}

  /* Map */
  #map-wrap{flex:1 1 auto;position:relative;min-width:0;}
  #map{position:absolute;inset:0;background:#aadaff;}
  .map-note{position:absolute;bottom:10px;left:10px;z-index:600;background:rgba(255,255,255,.92);
            border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:11px;color:var(--muted);
            box-shadow:var(--shadow);pointer-events:none;max-width:330px;line-height:1.5;}

  /* Detail panel */
  #detail{position:absolute;top:10px;right:10px;bottom:10px;width:336px;z-index:700;background:var(--panel);
          border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.16);
          display:flex;flex-direction:column;transform:translateX(380px);opacity:0;transition:transform .28s ease,opacity .28s ease;}
  #detail.open{transform:translateX(0);opacity:1;}
  .d-head{display:flex;align-items:center;gap:10px;padding:14px 14px 12px;border-bottom:1px solid var(--line);}
  .d-head img{width:34px;height:24px;border-radius:3px;box-shadow:0 0 0 1px rgba(0,0,0,.1);}
  .d-head .dn{font-size:16px;font-weight:700;line-height:1.15;}
  .d-head .dg{font-size:12px;color:var(--muted);}
  .d-head .x{margin-left:auto;border:0;background:#f3f4f6;border-radius:8px;width:28px;height:28px;cursor:pointer;
             font-size:16px;color:var(--muted);line-height:1;}
  .d-head .x:hover{background:#e5e7eb;}
  .d-body{flex:1 1 auto;overflow-y:auto;padding:12px 14px 16px;}
  .d-stats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .pill{font-size:11px;color:#374151;background:#f3f4f6;border-radius:6px;padding:4px 8px;font-variant-numeric:tabular-nums;}
  .pill b{color:var(--ink);}
  .d-sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
         margin:6px 0 8px;display:flex;align-items:center;gap:8px;}
  .tag{font-weight:600;text-transform:none;letter-spacing:0;font-size:10px;color:#475569;background:#eef2f6;
       border-radius:6px;padding:2px 6px;}
  .bars{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
  .bar-row{display:grid;grid-template-columns:104px 1fr 22px;gap:7px;align-items:center;font-size:12px;}
  .bar-lab{display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-lab img{width:16px;height:12px;border-radius:1px;box-shadow:0 0 0 1px rgba(0,0,0,.1);flex:0 0 auto;}
  .bar-track{background:#f1f2f4;border-radius:5px;height:16px;overflow:hidden;}
  .bar-fill{display:block;height:100%;border-radius:5px;min-width:3px;transition:width .5s ease;}
  .bar-n{text-align:right;font-weight:600;color:#374151;font-variant-numeric:tabular-nums;}
  /* Squad list (detail panel) */
  #dSquad{margin-bottom:6px;}
  .sq-grp{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin:9px 0 2px;}
  .sq-row{display:grid;grid-template-columns:16px minmax(0,1.15fr) minmax(0,0.82fr) 56px;gap:8px;align-items:baseline;padding:3px 1px;font-size:12.5px;}
  .sq-row .sq-no{color:var(--muted);font-size:10.5px;text-align:right;}
  .sq-row .sq-name{color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sq-row .sq-club{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sq-empty{font-size:12px;color:var(--muted);padding:4px 0;}
  /* Salary layer (confidence-tiered) */
  .sq-pay{font-size:11px;text-align:right;font-variant-numeric:tabular-nums;text-decoration:none;color:var(--ink);white-space:nowrap;}
  .sq-pay:hover{text-decoration:underline;}
  .sq-pay.none{color:var(--muted);}
  .cdot{display:inline-block;width:7px;height:7px;border-radius:50%;vertical-align:middle;}
  .sq-pay .cdot{width:6px;height:6px;margin-right:3px;}
  .cdot.a{background:#16a34a;}                       /* Tier A — official/Capology */
  .cdot.b{background:transparent;box-shadow:inset 0 0 0 1.5px #d97706;}  /* Tier B — estimated */
  .wage-head{font-size:15px;font-weight:700;color:var(--ink);margin:2px 0;}
  .wage-head .wmut{font-size:11.5px;font-weight:500;color:var(--muted);}
  .wage-note{font-size:11px;color:var(--muted);font-style:italic;margin:1px 0 2px;}
  .wage-ind{font-size:10.5px;font-weight:600;font-style:italic;color:#b45309;margin:1px 0 3px;}
  .wage-src{font-size:9.5px;color:var(--muted);margin:3px 0 2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
  .fixtures{display:flex;flex-direction:column;gap:6px;}
  .fx{display:grid;grid-template-columns:30px 1fr auto;gap:8px;align-items:center;font-size:12px;
      border:1px solid var(--line);border-radius:8px;padding:7px 9px;}
  .fx .md{color:var(--muted);font-size:11px;}
  .fx .opp{display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fx .opp img{width:18px;height:13px;border-radius:1px;box-shadow:0 0 0 1px rgba(0,0,0,.1);}
  .fx .res{font-weight:700;font-variant-numeric:tabular-nums;}
  .fx .res.W{color:var(--win);} .fx .res.L{color:var(--loss);} .fx .res.D{color:var(--draw);}
  .fx .res.sched{font-weight:500;color:var(--muted);}
  .d-foot{font-size:10px;color:var(--muted);padding:10px 14px;border-top:1px solid var(--line);line-height:1.5;}
  .empty{font-size:12px;color:var(--muted);background:#f9fafb;border:1px dashed var(--line);border-radius:8px;
         padding:12px;line-height:1.5;margin-bottom:16px;}

  .funfact{display:none;font-size:12px;line-height:1.5;color:#3f3f46;background:#f6f3ff;border:1px solid #e7e0fb;
           border-left:3px solid #7c3aed;border-radius:8px;padding:8px 10px 8px 12px;margin:-2px 0 14px;}
  .funfact::before{content:"⚽ ";}

  /* Scorers view */
  #scorer-board, #scorer-nation{display:none;position:absolute;top:10px;bottom:10px;z-index:600;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.16);overflow:auto;}
  #scorer-board{right:10px;width:312px;} #scorer-nation{left:10px;width:320px;}
  body.view-scorers #sidebar, body.view-scorers #detail{display:none;}
  body.view-scorers #scorer-board{display:block;}
  body.view-scorers #scorer-nation.open{display:block;}

  /* Travel view — each nation's journey between venues over the map */
  #travel-board{display:none;position:absolute;top:10px;bottom:10px;left:10px;z-index:600;width:344px;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.16);overflow:auto;}
  body.view-travel #sidebar, body.view-travel #detail{display:none;}
  body.view-travel #travel-board{display:block;}
  body.view-travel .map-note{display:none;}
  /* Travel keeps the map at full richness (no grey backdrop) so the routes read against real tiles. */
  body.view-travel .leaflet-top.leaflet-left{left:365px;}
  .tv-row{display:flex;align-items:center;gap:9px;padding:7px 12px;cursor:pointer;border-left:3px solid transparent;}
  .tv-row:hover{background:rgba(125,125,125,.08);}
  .tv-row.sel{background:rgba(125,125,125,.12);}   /* accent colour set inline per nation */
  .tv-row img{width:22px;height:16px;border-radius:3px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.15);}
  .tv-rank{width:20px;text-align:right;font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .tv-name{flex:1;min-width:0;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tv-sub{display:block;font-size:10px;color:var(--muted);font-weight:500;}
  .tv-out{display:inline-block;font-size:9px;font-weight:800;color:var(--muted);border:1px solid var(--line);
    border-radius:5px;padding:0 5px;margin-left:5px;vertical-align:1px;}
  .tv-km{font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums;}
  .tv-legs{padding:2px 12px 10px 42px;font-size:11.5px;color:var(--muted);}
  .tv-leg{display:flex;justify-content:space-between;gap:8px;padding:2px 0;}
  .tv-leg.future{opacity:.6;font-style:italic;}
  .tv-leg .lk{font-variant-numeric:tabular-nums;white-space:nowrap;}
  .tv-stop{background:transparent;}
  .tv-stop-in{display:block;height:18px;border-radius:9px;font:700 10px/18px -apple-system,system-ui,sans-serif;
    text-align:center;box-shadow:0 0 0 2px rgba(255,255,255,.9),0 1px 4px rgba(0,0,0,.35);}
  .leaflet-tooltip.tv-city{background:transparent;border:0;box-shadow:none;padding:0 2px;
    color:var(--ink);font-size:9.5px;font-weight:700;letter-spacing:.02em;
    text-shadow:0 1px 3px var(--panel),0 -1px 3px var(--panel),1px 0 3px var(--panel),-1px 0 3px var(--panel);}
  .leaflet-tooltip.tv-city::before{display:none;}
  .tv-flag img{width:24px;height:18px;border-radius:3px;object-fit:cover;
    box-shadow:0 0 0 1.5px #fff,0 1px 5px rgba(0,0,0,.45);}
  /* the flag that flies along the route while a journey animates */
  .tv-planeflag img{width:26px;height:19px;border-radius:3px;object-fit:cover;
    box-shadow:0 0 0 2px #fff,0 2px 8px rgba(0,0,0,.6);}
  .tv-div{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:10px;font-weight:800;
    letter-spacing:1.4px;text-transform:uppercase;padding:10px 12px 4px;}
  .tv-div::before,.tv-div::after{content:"";flex:1;border-top:1px solid var(--line);}
  .sp-title{font-size:15px;font-weight:700;padding:14px 14px 2px;}
  .sp-sub{font-size:11px;color:var(--muted);padding:0 14px 10px;border-bottom:1px solid var(--line);}
  .sp-head{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--line);}
  .sp-head img{width:34px;height:24px;border-radius:3px;box-shadow:0 0 0 1px rgba(0,0,0,.1);}
  .sp-head .dn{font-size:16px;font-weight:700;line-height:1.15;} .sp-head .dg{font-size:12px;color:var(--muted);}
  .lb{padding:6px 0 10px;}
  .lb-row{display:grid;grid-template-columns:20px 22px 1fr 58px 22px;gap:8px;align-items:center;padding:7px 12px;cursor:pointer;border-left:3px solid transparent;}
  .lb-row:hover{background:#f7faf8;}
  .lb-row.on{background:#fff7ec;border-left-color:var(--selected);}
  .lb-row:focus-visible{outline:2px solid #93c5fd;outline-offset:-2px;}
  .lb-rank{font-size:12px;color:var(--muted);text-align:center;font-variant-numeric:tabular-nums;}
  .lb-flag{width:22px;height:15px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.08);}
  .lb-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lb-name .lb-nat{display:block;font-size:10px;font-weight:500;color:var(--muted);}
  .lb-bar{background:#f1f2f4;border-radius:5px;height:10px;overflow:hidden;}
  .lb-fill{display:block;height:100%;border-radius:5px;background:var(--selected);}
  .lb-goals{font-size:13px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;}

  /* Bracket view */
  #bracket-view{display:none;position:absolute;inset:0;z-index:500;overflow:auto;background:transparent;padding:16px 20px 30px;}
  body.view-bracket #sidebar{display:none;}
  body.view-bracket #detail:not(.open){display:none !important;}   /* show the nation panel when a bracket team is clicked */
  body.view-bracket #bracket-view{display:block;}
  /* greyed world map shows through as the bracket backdrop */
  body.view-bracket .leaflet-tile-pane{filter:grayscale(1) brightness(1.06) opacity(0.5);}
  body.view-bracket .map-note{display:none;}
  /* Keep the +/- zoom control in bracket view so the backdrop map can be zoomed back out;
     move it clear of the bracket title to the lower-left, above the bracket overlay. */
  body.view-bracket .leaflet-top.leaflet-left{top:auto;bottom:6px;z-index:1000;}
  /* Scorers view: the nation panel (left:10, width:320) covers the map's left edge,
     so push the zoom control clear of it instead of letting it sit on the flag. */
  body.view-scorers .leaflet-top.leaflet-left{left:340px;}
  .bk-title{font-size:18px;font-weight:700;margin:0 0 14px;letter-spacing:-.2px;
    text-shadow:0 1px 8px rgba(255,255,255,.95),0 0 2px rgba(255,255,255,.95);}
  /* Dark mode: the map behind is dark, so glow dark (not white) and brighten the hint. */
  body.theme-dark .bk-title{text-shadow:0 1px 10px rgba(0,0,0,.92),0 0 3px rgba(0,0,0,.95);}
  .bk-sub{font-weight:500;font-size:13px;color:var(--ink);opacity:.78;}
  .bracket{display:flex;align-items:stretch;gap:12px;min-width:1180px;min-height:740px;position:relative;}
  svg.bk-lines path{stroke:#d1d5db;}
  .bk-half{display:flex;gap:12px;flex:1;}
  .bk-half.right{flex-direction:row-reverse;}
  .bk-col{display:flex;flex-direction:column;flex:1;min-width:120px;}
  .bk-col .bk-h,.bk-center .bk-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:center;padding-bottom:8px;flex:0 0 auto;}
  .bk-matches{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:8px;}
  .bk-center{display:flex;flex-direction:column;justify-content:center;align-items:stretch;min-width:166px;}
  .mbox{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden;position:relative;z-index:1;}
  /* Next match — blue dashed frame; live match — pulsing coral frame + rolling ball (matches the sweepstake page). */
  .mbox.next{border:1.5px dashed #005DFF;box-shadow:0 0 0 2px rgba(0,93,255,.22);z-index:2;}
  body.theme-dark .mbox.next{border-color:#4d8bff;box-shadow:0 0 0 2px rgba(77,139,255,.28);}
  .mbox.live{border:1.5px solid #FF511D;box-shadow:0 0 0 2px rgba(255,81,29,.30);z-index:2;overflow:visible;
    animation:live-pulse 1.6s infinite;}
  @keyframes live-pulse{0%,100%{box-shadow:0 0 0 2px rgba(255,81,29,.20)}50%{box-shadow:0 0 0 5px rgba(255,81,29,.45)}}
  @media (prefers-reduced-motion:reduce){.mbox.live{animation:none;box-shadow:0 0 0 2px rgba(255,81,29,.35);}}
  .mdate .mlive{color:#FF511D;font-weight:800;letter-spacing:.03em;margin-right:5px;}
  body.theme-dark .mdate .mlive{color:#ff7a4f;}
  .mdate .mnext{color:#005DFF;font-weight:800;letter-spacing:.03em;margin-right:5px;}
  body.theme-dark .mdate .mnext{color:#7fabff;}
  .mball{position:absolute;bottom:-11px;left:2px;font-size:13px;line-height:1;z-index:5;pointer-events:none;
         filter:drop-shadow(0 1px 1px rgba(0,0,0,.35));animation:mball-roll 2.6s linear infinite;}
  @keyframes mball-roll{0%{left:2px;transform:rotate(0)}100%{left:calc(100% - 15px);transform:rotate(1080deg)}}
  @media (prefers-reduced-motion:reduce){.mball{animation:none;}}
  /* In the bracket, boxes are ~50% transparent so the highlighted nation shows through the map (text stays opaque) */
  body.view-bracket .mbox{background:rgba(255,255,255,.5);}
  body.view-bracket .mdate{background:rgba(245,247,250,.4);}
  body.view-bracket .bk-final-box .mdate{background:rgba(255,247,236,.6);}
  body.theme-dark.view-bracket .mbox{background:rgba(20,28,48,.5);}
  body.theme-dark.view-bracket .mdate{background:rgba(14,22,40,.45);}
  body.theme-dark.view-bracket .bk-final-box .mdate{background:rgba(42,33,18,.6);color:#fcd9a8;}
  /* Clickable match header → head-to-head */
  .mdate.has-h2h{cursor:pointer;}
  .mdate.has-h2h:hover{color:var(--selected);}
  .mdate .h2h-hint{float:right;font-weight:700;letter-spacing:.02em;opacity:.8;}
  .mdate .mvenue{display:block;clear:both;margin-top:1px;font-size:8.5px;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #h2h{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:800;width:min(440px,92vw);
       background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 60px rgba(0,0,0,.45);padding:18px 20px 20px;}
  #h2h.open{display:block;}
  #h2h .x{position:absolute;top:8px;right:12px;border:0;background:transparent;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;}
  .h2h-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:12px;}
  .h2h-teams{display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;font-weight:700;margin-bottom:14px;flex-wrap:wrap;text-align:center;}
  .h2h-teams img{width:30px;height:21px;border-radius:3px;box-shadow:0 0 0 1px rgba(0,0,0,.12);}
  .h2h-teams .vs{color:var(--muted);font-weight:600;font-size:12px;}
  .h2h-fact{font-size:14px;line-height:1.55;color:var(--ink);}
  /* FIFA head-to-head record (pre-baked) + FIFA ranking chips */
  .h2h-rk{font-size:11px;font-weight:700;color:var(--selected);vertical-align:middle;}
  .team .rk{font-size:9.5px;font-weight:700;color:var(--muted);margin-left:4px;vertical-align:middle;}
  .h2h-live{margin-top:13px;}
  .h2h-loading{font-size:13px;color:var(--muted);}
  .h2h-rec{font-size:13.5px;line-height:1.5;color:var(--ink);}
  .h2h-rec.muted{color:var(--muted);font-size:13px;}
  .h2h-tot{margin-bottom:8px;color:var(--muted);}
  .h2h-tot b{color:var(--ink);font-weight:700;}
  .h2h-wdl{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px;
    padding:8px 11px;border-radius:9px;background:rgba(148,163,184,.16);font-weight:700;}
  .h2h-wdl .nm{font-size:12.5px;}
  .h2h-wdl .n{font-size:16px;}
  .h2h-wdl .d{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .h2h-row{display:flex;gap:9px;margin-bottom:5px;}
  .h2h-row .k{color:var(--muted);min-width:74px;flex:0 0 auto;font-size:11px;
    text-transform:uppercase;letter-spacing:.05em;padding-top:2px;}
  .h2h-row b{color:var(--ink);}
  .h2h-pen{color:var(--selected);font-weight:600;white-space:nowrap;}
  .h2h-src{margin-top:11px;font-size:10.5px;color:var(--muted);opacity:.8;line-height:1.4;}
  /* Best third-placed teams card (bracket page) */
  .bk-3rd-chip{margin-left:12px;font:inherit;font-size:12px;font-weight:600;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:999px;padding:4px 12px;cursor:pointer;vertical-align:middle;white-space:nowrap;}
  .bk-3rd-chip:hover{border-color:var(--selected);color:var(--selected);}
  /* same card, opened from the Map tab's sidebar */
  .sb-3rd-chip{display:block;width:100%;margin-top:8px;font:inherit;font-size:12.5px;font-weight:600;
    color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:999px;
    padding:7px 12px;cursor:pointer;transition:border-color .15s,color .15s;}
  .sb-3rd-chip:hover{border-color:var(--selected);color:var(--selected);}
  #third, #odds{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:800;width:min(560px,94vw);
    max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 18px 60px rgba(0,0,0,.45);padding:18px 22px 18px;}
  #third.open, #odds.open{display:block;}
  #third .x, #odds .x{position:absolute;top:8px;right:12px;border:0;background:transparent;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;}
  .od-head,.od-row{display:grid;grid-template-columns:26px 28px 1fr 64px 44px 44px;gap:9px;align-items:center;}
  .od-head{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:0 9px 7px;border-bottom:1px solid var(--line);}
  .od-head span{text-align:center;} .od-head .od-nm{text-align:left;}
  .od-row{padding:7px 9px;border-radius:9px;font-size:14px;margin-top:2px;}
  .od-row img{width:24px;height:16px;border-radius:2px;box-shadow:0 0 0 1px rgba(0,0,0,.12);}
  .od-row .od-rank{font-weight:700;color:var(--muted);text-align:center;font-size:12.5px;}
  .od-row .od-nm{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .od-row .od-nm .rk{font-size:11px;color:var(--muted);font-weight:600;}
  .od-champ{position:relative;height:18px;border-radius:5px;background:rgba(125,125,125,.14);overflow:hidden;}
  .od-champ i{position:absolute;inset:0 auto 0 0;background:var(--selected);opacity:.85;border-radius:5px;}
  .od-champ b{position:absolute;inset:0;font-size:11px;font-weight:800;text-align:center;line-height:18px;font-style:normal;}
  .od-pct{text-align:center;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .win-odds{font-size:10px;font-weight:700;color:var(--muted);}
  .h2h-compare{margin-top:14px;padding-top:2px;border-top:1px solid var(--line);}
  .cmp-head{display:grid;grid-template-columns:100px 1fr 1fr;gap:8px;padding:8px 4px;font-weight:700;align-items:center;}
  .cmp-head img{width:20px;height:14px;border-radius:2px;margin-right:5px;vertical-align:-2px;box-shadow:0 0 0 1px rgba(0,0,0,.12);}
  .cmp-head .lab{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em;}
  .cmp-row{display:grid;grid-template-columns:100px 1fr 1fr;gap:8px;padding:6px 4px;border-top:1px solid var(--line);
    font-size:12px;align-items:center;}
  .cmp-row .lab{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.04em;}
  .tp-sub{font-size:12.5px;color:var(--muted);margin-bottom:12px;line-height:1.45;}
  .tp-head,.tp-row{display:grid;grid-template-columns:26px 28px 1fr 38px 32px 40px 36px;gap:9px;align-items:center;}
  .tp-head{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:0 9px 7px;border-bottom:1px solid var(--line);}
  .tp-head span,.tp-row .tp-grp,.tp-row .tp-num,.tp-row .tp-pts{text-align:center;}
  .tp-head .tp-nm{text-align:left;}
  .tp-row{padding:8px 9px;border-radius:9px;font-size:14px;margin-top:2px;}
  .tp-row img{width:24px;height:16px;border-radius:2px;box-shadow:0 0 0 1px rgba(0,0,0,.12);}
  .tp-row .tp-rank{font-weight:700;color:var(--muted);text-align:center;font-size:12.5px;}
  .tp-row .tp-name{font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tp-row .tp-grp,.tp-row .tp-num{color:var(--muted);font-size:13px;}
  .tp-row .tp-pts{font-weight:700;color:var(--ink);}
  .tp-row.q{background:rgba(34,197,94,.13);}
  .tp-row.q .tp-rank{color:#16a34a;}
  body.theme-dark .tp-row.q{background:rgba(34,197,94,.16);}
  body.theme-dark .tp-row.q .tp-rank{color:#4ade80;}
  .tp-cut{display:flex;align-items:center;gap:8px;margin:9px 2px 3px;font-size:10px;text-transform:uppercase;
    letter-spacing:.06em;color:var(--muted);}
  .tp-cut::before,.tp-cut::after{content:"";flex:1;height:1px;background:var(--line);}
  .tp-row.out{opacity:.5;}
  .tp-foot{margin-top:12px;font-size:10.5px;color:var(--muted);opacity:.8;line-height:1.4;}
  .mdate{font-size:9px;color:var(--muted);padding:3px 8px;border-bottom:1px solid var(--line);background:#fafafa;}
  .mteam{display:flex;align-items:center;gap:7px;padding:7px 9px;font-size:12px;}
  .mteam+.mteam{border-top:1px solid #f1f2f4;}
  .mteam.pick{cursor:pointer;}
  .mteam.pick:hover{background:#eef5ff;}
  .mteam.bkactive{background:#fff7ec;box-shadow:inset 3px 0 0 var(--selected);}
  .mteam img{width:21px;height:15px;border-radius:1px;box-shadow:0 0 0 1px rgba(0,0,0,.1);flex:0 0 auto;}
  .mteam .mc{font-weight:600;}
  .mteam.tbd .mlabel{color:#9aa3af;font-size:11px;}
  .mteam .ms{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:700;color:#374151;}
  .mteam .ms .pens{font-size:9px;font-weight:600;opacity:.7;margin-left:1px;}
  .mteam.win .mc,.mteam.win .ms{color:var(--confirmed);}
  .bk-final-box .mbox{border-color:var(--selected);box-shadow:0 6px 18px rgba(245,158,11,.20);}
  .bk-final-box .mdate{background:#fff7ec;color:#b45309;font-weight:700;}
  .bk-third{margin-top:18px;}
  .bk-third .lab{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:center;padding-bottom:6px;}

  @media (max-width:640px){
    /* Header wraps so the Map / Bracket / Scorers switch is always reachable (it used to
       overflow off-screen on phones). View switch gets its own full-width row. */
    header{flex-wrap:wrap;gap:8px 6px;padding:8px 12px;}
    header .spacer{display:none;}
    header .title{flex:1 1 auto;font-size:15px;order:1;}
    header .title span{display:none;}            /* drop the "· Qualified Nations" subtitle on phones */
    #dataBadge{order:2;font-size:11px;}
    #themeBtn{order:3;} #refreshBtn{order:4;padding:6px 10px;}
    #viewSeg{order:10;flex:1 1 100%;}
    #viewSeg button{flex:1;padding:8px 0;}
    #colourSeg, #visits, #resetBtn{display:none;}   /* non-essential controls hidden on phones */

    main{flex-direction:column;}
    #sidebar{flex:0 0 auto;max-width:none;width:100%;max-height:42%;border-right:0;border-bottom:1px solid var(--line);}
    #detail{top:auto;left:10px;right:10px;width:auto;max-height:62%;transform:translateY(520px);}
    #detail.open{transform:translateY(0);}
    /* Scorers: the two side panels would collide on a phone — make them full-width bottom sheets. */
    #scorer-board, #scorer-nation{left:0;right:0;top:auto;bottom:0;width:auto;max-height:60%;border-radius:14px 14px 0 0;}
    /* The bracket page already scrolls (overflow:auto); the zoom nudge for scorers isn't needed on mobile. */
    body.view-scorers .leaflet-top.leaflet-left{left:0;}

    /* Bracket: keep the horizontal scroll, tighten the boxes, let the title + chips wrap. */
    .bk-title{font-size:15px;line-height:1.5;}
    .bk-title .bk-sub{display:none;}
    .bk-3rd-chip{display:inline-block;width:auto;font-size:11.5px;padding:5px 10px;margin:6px 6px 0 0;}
    .bk-col{min-width:104px;}
    .mteam{font-size:11px;padding:6px 7px;gap:5px;}
    .mdate{font-size:8px;}
    #bracket-view{-webkit-overflow-scrolling:touch;}

    /* Travel: the board becomes a bottom sheet (like the scorers panels). */
    #travel-board{left:0;right:0;top:auto;bottom:0;width:auto;max-height:52%;border-radius:14px 14px 0 0;}
    body.view-travel .leaflet-top.leaflet-left{left:0;}
    .leaflet-tooltip.tv-city{font-size:8.5px;}
  }
</style>
</head>
<body>
  <header>
    <div class="title">FIFA World Cup 2026 <span>· Qualified Nations</span></div>
    <div class="spacer"></div>
    <div class="seg" id="viewSeg" title="Switch view">
      <button data-view="map" class="on">Map</button>
      <button data-view="bracket">Bracket</button>
      <button data-view="scorers">Scorers</button>
      <button data-view="travel">Travel</button>
    </div>
    <div class="seg" id="colourSeg" title="Map colour mode">
      <button data-mode="continent" class="on">By continent</button>
      <button data-mode="single">Qualified</button>
    </div>
    <div id="dataBadge" class="badge mock"><span class="dot"></span><span id="dataBadgeText">Loading…</span></div>
    <div id="visits" class="badge" style="display:none" title="Total page views since launch"><span class="dot" style="background:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.18)"></span><span id="visitsText"></span></div>
    <button class="btn" id="themeBtn" title="Toggle light / dark mode">🌙</button>
    <button class="btn" id="resetBtn" title="Reset the map to the world view">Reset</button>
    <button class="btn" id="refreshBtn" title="Reload live standings">Refresh</button>
  </header>

  <main>
    <aside id="sidebar">
      <div class="sidebar-tools">
        <input id="search" class="search" type="search" placeholder="Search a nation or group…" aria-label="Search" />
        <button class="sb-3rd-chip" id="mapThirdChip" title="Best third-placed teams — top 8 reach the Round of 32">🥉 3rd-place race</button>
      </div>
      <div class="legend">
        <span class="item"><span class="swatch" style="background:#2563eb"></span>Europe</span>
        <span class="item"><span class="swatch" style="background:#16a34a"></span>S. America</span>
        <span class="item"><span class="swatch" style="background:#db2777"></span>N. America</span>
        <span class="item"><span class="swatch" style="background:#ea580c"></span>Africa</span>
        <span class="item"><span class="swatch" style="background:#7c3aed"></span>Asia</span>
        <span class="item"><span class="swatch" style="background:#0891b2"></span>Oceania</span>
        <span class="item"><span class="swatch" style="background:var(--selected)"></span>Selected</span>
        <span class="item"><span class="ldot" style="background:var(--win)"></span>W</span>
        <span class="item"><span class="ldot" style="background:var(--draw)"></span>D</span>
        <span class="item"><span class="ldot" style="background:var(--loss)"></span>L</span>
      </div>
      <div id="groups" aria-label="Groups and standings"></div>
    </aside>

    <div id="map-wrap">
      <div id="map"></div>
      <div class="map-note" id="mapNote">Click a nation to zoom in · loading…</div>

      <section id="detail" aria-label="Nation detail">
        <div class="d-head">
          <img id="dFlag" src="" alt="" />
          <div><div class="dn" id="dName"></div><div class="dg" id="dGroup"></div></div>
          <button class="x" id="dClose" title="Close" aria-label="Close">×</button>
        </div>
        <div class="d-body">
          <div class="d-stats" id="dStats"></div>
          <div class="funfact" id="dFact"></div>
          <div class="d-sec">Where the 26-man squad plays <span class="tag">by club country</span></div>
          <div id="dChart"></div>
          <div id="dWages"></div>
          <div class="d-sec" style="margin-top:6px">Squad <span class="tag" id="dCoach"></span></div>
          <div id="dSquad"></div>
          <div class="d-sec" style="margin-top:6px">Group fixtures</div>
          <div class="fixtures" id="dFixtures"></div>
        </div>
        <div class="d-foot" id="dFoot"></div>
      </section>

      <aside id="scorer-board" aria-label="Goal leaderboard"></aside>
      <aside id="scorer-nation" aria-label="Nation top scorers"></aside>
      <aside id="travel-board" aria-label="Travel tracker"></aside>
    </div>

    <div id="bracket-view" aria-label="Knockout bracket"></div>
    <div id="h2h" aria-live="polite"></div>
    <div id="third" aria-live="polite"></div>
    <div id="odds" aria-live="polite"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
  // ===================================================================
  //  CONFIG
  // ===================================================================
  const CONFIG = {
    // Live, CORS-open, no key required. Real draw + live standings + 104 fixtures.
    api: 'https://worldcup26.ir/get',
    // Static fallback (same project's repo data; real draw, standings may lag).
    staticTeams:  'https://cdn.jsdelivr.net/gh/rezarahiminia/worldcup2026@main/football.teams.json',
    staticGroups: 'https://cdn.jsdelivr.net/gh/rezarahiminia/worldcup2026@main/worldcup2026.groups.json',
    staticGames:  'https://cdn.jsdelivr.net/gh/rezarahiminia/worldcup2026@main/football.matches.json',
    // Boundaries: Natural Earth 1:50m (full coverage incl. Cape Verde, Curaçao). Match on ADM0_A3.
    geojsonUrl:      'https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_50m_admin_0_countries.geojson',
    geojsonFallback: 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_0_countries.geojson',
    // UK split into England / Scotland / Wales / N. Ireland (Natural Earth 50m map units) — relative file in the repo.
    ukUnitsUrl: 'uk_units.geojson',
    // Free, no-signup, CORS-open page-view counter (Abacus). Set to null to disable.
    visitorCounter: 'https://abacus.jasoncameron.dev/hit/ponienc-wc2026/views',
    // Pre-baked head-to-head, keyed by sorted FIFA codes. Bracket-driven and refreshed
    // daily (scripts/build_h2h.py + the GitHub Action). FIFA's complete H2H sits behind a
    // bot-walled, non-CORS endpoint, so we bake it server-side and serve this file.
    h2hData: 'h2h.json',
    // 26-man squads (player · position · club) + head coach, parsed from Wikipedia.
    // Regenerate with scripts/build_squads.py.
    squads: 'squads.json',
    // Confidence-tiered estimated salaries {meta, teams:{FC:{priced,total,tierA,tierB,players}}}.
    // Regenerate with scripts/build_salaries.py.
    salaries: 'salaries.json',
    // Baked goalscorers from FIFA's per-match feed (stable player ids, clean names — the
    // worldcup26.ir scorer strings are garbled). Refreshed by the same Action as h2h.json;
    // the app tops up matches that finished after the bake live from api.fifa.com.
    scorers: 'scorers.json',
    // FIFA/Coca-Cola World Ranking — api.fifa.com IS CORS-open, so the ranking loads live.
    fifaApi: 'https://api.fifa.com/api/v3',
    rankTtlMs: 24 * 60 * 60 * 1000,   // ranking changes ~monthly — cache a day in localStorage
    // FIFA's official WC2026 match feed drives the knockout bracket — the worldcup26.ir feed
    // lags on who has qualified. idCompetition 17 = men's World Cup; idSeason 285023 = 2026.

  const dateKey = (s) => { const m = /(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/.exec(s||''); return m ? m[3]+m[1].padStart(2,'0')+m[2].padStart(2,'0')+m[4].padStart(2,'0')+m[5] : '0'; };
  const dateLabel = (s) => { const m = /(\d+)\/(\d+)\/(\d+)/.exec(s||''); return m ? `${m[1]}/${m[2]}` : ''; };

  async function loadData() {
    // Fetch each source independently and fall back to its static snapshot per-source, so one
    // flaky endpoint can't blank the dashboard. The bracket / fixtures / scorers need games, so we
    // never ingest empty games on a hiccup — we drop back to the static schedule instead.
    let liveOk = true;
    const get = async (live, fallback) => {
      try { return await fetchJSON(live); }
      catch (e) { liveOk = false; console.warn('Live fetch failed, using static:', live, e); return fetchJSON(fallback); }
    };
    try {
      const [tj, gj, mj] = await Promise.all([
        get(CONFIG.api + '/teams',  CONFIG.staticTeams),
        get(CONFIG.api + '/groups', CONFIG.staticGroups),
        get(CONFIG.api + '/games',  CONFIG.staticGames),
      ]);
      ingest(tj.teams || tj, gj.groups || gj, mj.games || mj);
      isLive = liveOk;
      // worldcup26.ir stopped touching group records when the group stage ended, so their
      // updatedAt froze (badge stuck on 28 Jun). A successful live fetch IS fresh as of now;
      // the source stamp remains only for the static fallback.
      lastUpdated = liveOk ? new Date().toISOString()
                           : (gj.groups || gj).map(g => g.updatedAt).filter(Boolean).sort().pop() || null;
    } catch (e) {
      console.error('All data sources failed.', e); ingest([], [], []);

    await applyFifaBracket();   // FIFA's official knockout assignments override the lagging feed
    await loadScorersFifa();    // FIFA-sourced goals replace the garbled feed names (fallback stays)

  // Overlay the knockout bracket (M73–M104) with FIFA's official, up-to-date team assignments +
  // results. worldcup26.ir lags on who has qualified, so we trust FIFA (api.fifa.com is CORS-open)
  // for the bracket; standings / scorers stay on worldcup26.ir. FIFA's MatchNumber == our M-id, and
  // Home/Away.IdCountry == our FIFA code. Additive: if the fetch fails, the feed's bracket remains.
  async function applyFifaBracket() {
    try {
      const url = `${CONFIG.fifaApi}/calendar/matches?idCompetition=${CONFIG.wcCompetition}&idSeason=${CONFIG.wcSeason}&count=200`;
      const results = (await (await fetch(url, { cache:'no-store' })).json()).Results || [];
      journeysByFifa.clear();
      for (const m of results) {
        const num = m.MatchNumber;
        if (!num) continue;
        // Remember every match's FIFA ids + status — the scorer loader needs them to top up
        // goals for matches that finished (or are live) after the scorers.json bake.
        fifaMatchMeta.set(num, { stage: m.IdStage, match: m.IdMatch, status: m.MatchStatus,
                                 home: (m.Home || {}).IdCountry, away: (m.Away || {}).IdCountry });
        // Travel tab: log each side's visit to the venue (played and scheduled alike).
        const sid = String((m.Stadium || {}).IdStadium || '');
        if (STADIUMS[sid] && m.Date) {
          for (const [side, other] of [['Home','Away'], ['Away','Home']]) {
            const fc = (m[side] || {}).IdCountry;
            if (!fc) continue;
            if (!journeysByFifa.has(fc)) journeysByFifa.set(fc, []);
            journeysByFifa.get(fc).push({ date: m.Date, sid, num, done: m.MatchStatus === 0,
                                          opp: (m[other] || {}).IdCountry || null });
          }
        }
        if (num < 73) continue;                            // bracket overlay: knockout matches only
        const id = String(num);
        const g = gamesById.get(id) || { id, homeId:'0', awayId:'0', hs:0, as:0, finished:false, type:'ko' };
        const ht = teamsByFifa.get((m.Home || {}).IdCountry), at = teamsByFifa.get((m.Away || {}).IdCountry);
        if (ht) g.homeId = ht.id;
        if (at) g.awayId = at.id;
        const hs = (m.Home || {}).Score, as = (m.Away || {}).Score;
        // FIFA carries the in-play score while a match runs — only MatchStatus 0 means full-time.
        if (hs != null && as != null) { g.hs = hs; g.as = as; g.finished = m.MatchStatus === 0; }
        const hp = m.HomeTeamPenaltyScore, ap = m.AwayTeamPenaltyScore;
        if (hp != null && ap != null) { g.hp = hp; g.ap = ap; }   // penalty-shootout scoreline
        if (m.Date) g.ko = m.Date;                                 // UTC kickoff — localised in the browser
        g.status = m.MatchStatus;                                  // 0 finished · 1 scheduled · 3 live
        const st = m.Stadium || {};
        const venue = [locName(st.Name), locName(st.CityName)].filter(Boolean).join(', ');
        if (venue) g.venue = venue;
        gamesById.set(id, g);
      }
      for (const trips of journeysByFifa.values())
        trips.sort((a, b) => new Date(a.date) - new Date(b.date));
      thirdPlaceRanking = computeThirdPlace(results);       // the best-third-placed-teams card
    } catch (e) { console.warn('FIFA bracket overlay failed — keeping worldcup26.ir bracket.', e); }
  }

      const ranked = Object.entries(tab[grp])
        .sort((a, b) => b[1].pts - a[1].pts || b[1].gd - a[1].gd || b[1].gf - a[1].gf);
      if (ranked.length >= 3) thirds.push({ fifa: ranked[2][0], group: grp.replace('Group ', ''), ...ranked[2][1] });
    }
    thirds.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    thirds.forEach((t, i) => t.qualifies = i < 8);
    return thirds;
  }

  function ingest(teams, groups, games) {
    teamsById.clear(); teamsByFifa.clear(); teamsByIso3.clear(); gamesByTeam.clear(); gamesById.clear();
    for (const t of teams) {
      const iso3 = toIso3(t.fifa_code);
      const rec = { id:String(t.id), name:t.name_en, fifa:t.fifa_code, iso2:t.iso2, iso3,
                    flag:t.flag, group:t.groups };
      teamsById.set(rec.id, rec);
      teamsByFifa.set(rec.fifa, rec);
      if (!teamsByIso3.has(iso3)) teamsByIso3.set(iso3, []);
      teamsByIso3.get(iso3).push(rec);
    }
    for (const g of games) {
      const game = { id:String(g.id), homeId:String(g.home_team_id), awayId:String(g.away_team_id),
                     hs:num(g.home_score), as:num(g.away_score), finished:String(g.finished).toUpperCase()==='TRUE',
                     group:g.group, matchday:g.matchday, date:g.local_date, key:dateKey(g.local_date),
                     homeName:g.home_team_name_en, awayName:g.away_team_name_en, type:g.type };
      gamesById.set(game.id, game);
      for (const id of [game.homeId, game.awayId]) {
        if (!gamesByTeam.has(id)) gamesByTeam.set(id, []);
        gamesByTeam.get(id).push(game);
      }
    }
    const byName = {};
    for (const grp of groups) {
      byName[grp.name] = (grp.teams || []).map(s => {
        const rec = teamsById.get(String(s.team_id)) || { id:String(s.team_id), name:'#'+s.team_id, iso3:'', group:grp.name };
        return { ...rec, mp:num(s.mp), w:num(s.w), d:num(s.d), l:num(s.l),
                 gf:num(s.gf), ga:num(s.ga), gd:num(s.gd), pts:num(s.pts), tcs:null };
      });
    }
    groupsOrdered = Object.keys(byName).sort().map(n => [n, byName[n]]);
    parseScorers(games);
  }

  function teamForm(id) {
    return (gamesByTeam.get(id) || []).filter(g => g.finished).sort((a,b)=>a.key.localeCompare(b.key))
      .map(g => { const home = g.homeId===id; const gf = home?g.hs:g.as, ga = home?g.as:g.hs;
                  return gf>ga ? 'W' : gf<ga ? 'L' : 'D'; });
  }

  // ===================================================================
  //  SIDEBAR
  // ===================================================================
  const sign = (n) => n>0 ? '+'+n : ''+n;
  function formDots(id) {
    const f = teamForm(id); const slots = [];
    for (let i=0;i<3;i++) slots.push(f[i] ? `<span class="fdot ${f[i]}"></span>` : `<span class="fdot n">–</span>`);
    return slots.join('');
  }

  function renderSidebar() {
    const root = document.getElementById('groups');
    root.innerHTML = groupsOrdered.map(([g, rows]) => `
      <section class="group" data-group="${g}">
        <h2>Group ${g}

        <div class="thead"><span></span><span></span><span>Team</span>
          <span class="c">P</span><span class="c">GD</span><span class="r">Pts</span><span class="r">Form</span></div>
        ${rows.map((r,i) => `
          <div class="team" role="button" tabindex="0" data-id="${r.id}"
               data-search="${(r.name+' group '+g).toLowerCase()}" aria-label="${r.name}, Group ${g}">

            <span class="name">${r.name}${r.fifa && rankOf(r.fifa) ? ` <span class="rk">#${rankOf(r.fifa)}</span>` : ''}</span>
            <span class="num">${r.mp}</span>
