<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FIFA World Cup 2026 — Qualified Nations Dashboard</title>
<meta name="description" content="An unofficial interactive map dashboard of all 48 FIFA World Cup 2026 nations — live standings, a knockout bracket, squad-league charts, population and fun facts. GIS × football." />
<meta property="og:title" content="FIFA World Cup 2026 — Qualified Nations Map Dashboard" />
<meta property="og:description" content="All 48 nations on an interactive world map: live standings, a knockout bracket over a greyed globe, squad-league charts and fun facts." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://ponienc.github.io/wc2026_dashboard/" />
<meta name="twitter:card" content="summary" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%2316a34a'/%3E%3Ccircle cx='8' cy='8' r='3.4' fill='white'/%3E%3C/svg%3E" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root {
    --bg:#f3f4f6; --panel:#fff; --ink:#1f2933; --muted:#6b7280; --line:#e5e7eb;
    --selected:#f59e0b; --win:#22c55e; --draw:#9ca3af; --loss:#ef4444; --confirmed:#16a34a;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  }
  /* Dark mode — auto by the viewer's local clock; CARTO Dark Matter basemap */
  body.theme-dark{
    --bg:#0b1220; --panel:#161f33; --ink:#e6edf6; --muted:#94a3b8; --line:#2a3650;
    --shadow:0 2px 10px rgba(0,0,0,.5);
  }
  body.theme-dark #map{background:#0a1626;}
  body.theme-dark .group h2, body.theme-dark .mdate{background:#111a2c;}
  body.theme-dark .team{border-bottom-color:#1e2840;}
  body.theme-dark .team:hover, body.theme-dark .mteam.pick:hover, body.theme-dark .lb-row:hover{background:#1a2438;}
  body.theme-dark .team.active, body.theme-dark .mteam.bkactive, body.theme-dark .lb-row.on{background:#2a2413;}
  body.theme-dark .team .num{color:#aeb9cb;}
  body.theme-dark .search, body.theme-dark .badge, body.theme-dark button.btn, body.theme-dark .seg button{background:#0f1830;color:var(--ink);}
  body.theme-dark button.btn:hover{background:#15203a;}
  body.theme-dark .seg button.on{background:#21305a;color:#c7d2fe;}
  body.theme-dark .map-note{background:rgba(16,24,42,.92);}
  body.theme-dark .pill{background:#1e2840;color:#c7d2e0;}
  body.theme-dark .funfact{background:#1a1733;border-color:#2f2a4d;color:#d6d0ee;}
  body.theme-dark .bar-track, body.theme-dark .lb-bar{background:#26324c;}
  body.theme-dark .mteam+.mteam{border-top-color:#1e2840;}
  body.theme-dark .tag{background:#1e2840;color:#aeb9cb;}
  body.theme-dark .wage-ind{color:#fbbf24;}
  body.theme-dark .empty{background:#0f1830;border-color:#2a3650;}
  body.theme-dark .d-head .x{background:#1e2840;color:var(--muted);}
  body.theme-dark .leaflet-bar a{background:#161f33;color:#e6edf6;border-color:#2a3650;}
  body.theme-dark.view-bracket .leaflet-tile-pane{filter:grayscale(0.85) opacity(0.5);}

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       color:var(--ink);background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}

  /* Header */
  header{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:10px 18px;background:var(--panel);
         border-bottom:1px solid var(--line);box-shadow:var(--shadow);z-index:1100;}
  header .title{font-size:17px;font-weight:700;letter-spacing:-.2px;white-space:nowrap;}
  header .title span{color:var(--muted);font-weight:500;}
  header .spacer{flex:1;}
  .badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--muted);
         padding:5px 11px;border:1px solid var(--line);border-radius:999px;background:#fff;white-space:nowrap;}
  .badge .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
  .badge.live .dot{background:var(--win);box-shadow:0 0 0 3px rgba(34,197,94,.18);}
  .badge.mock .dot{background:var(--selected);}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .seg button{font:inherit;font-size:12px;font-weight:600;border:0;background:#fff;color:var(--muted);
              padding:6px 10px;cursor:pointer;}
  .seg button.on{background:#eef2ff;color:#3730a3;}
  button.btn{font:inherit;font-size:12px;font-weight:600;cursor:pointer;padding:6px 12px;border-radius:8px;
             border:1px solid var(--line);background:#fff;color:var(--ink);}
  button.btn:hover{background:#f9fafb;border-color:#d1d5db;}

  main{flex:1 1 auto;display:flex;min-height:0;position:relative;}

  /* Sidebar */
  #sidebar{flex:0 0 392px;max-width:392px;background:var(--bg);border-right:1px solid var(--line);
           display:flex;flex-direction:column;min-height:0;}
  .sidebar-tools{padding:12px 14px 8px;}
  .search{width:100%;font:inherit;font-size:13px;padding:9px 12px;border-radius:9px;border:1px solid var(--line);
          background:#fff;outline:none;}
  .search:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.12);}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;padding:6px 14px 10px;font-size:11px;color:var(--muted);}
  .legend .item{display:inline-flex;align-items:center;gap:5px;}
  .ldot{width:9px;height:9px;border-radius:50%;}
  .swatch{width:11px;height:11px;border-radius:3px;}

  #groups{flex:1 1 auto;overflow-y:auto;padding:4px 14px 18px;}
  .group{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;
         box-shadow:var(--shadow);overflow:hidden;}
  .group h2{margin:0;padding:10px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;
            border-bottom:1px solid var(--line);background:#fafafa;}
  .group h2 .chip{width:12px;height:12px;border-radius:3px;flex:0 0 auto;}
  .group h2 .gcount{margin-left:auto;font-size:11px;font-weight:500;color:var(--muted);}
  .thead,.team{display:grid;grid-template-columns:18px 28px 1fr 24px 30px 28px auto;gap:6px;align-items:center;}
  .thead{padding:6px 12px 6px 8px;font-size:10px;color:var(--muted);text-transform:uppercase;
         letter-spacing:.04em;border-bottom:1px solid var(--line);}
  .thead .c{text-align:center;} .thead .r{text-align:right;}
  .team{padding:9px 12px 9px 8px;border-bottom:1px solid #f1f2f4;cursor:pointer;transition:background .12s;
        border-left:3px solid transparent;}
  .team:last-child{border-bottom:0;}
  .team:hover{background:#f7faf8;}
  .team:focus-visible{outline:2px solid #93c5fd;outline-offset:-2px;}
  .team.active{background:#fff7ec;border-left-color:var(--selected);}
  .team .pos{font-size:12px;color:var(--muted);text-align:center;}
  .team .flag{width:26px;height:18px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.08);}
  .team .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .team .num{font-size:12px;text-align:right;color:#374151;font-variant-numeric:tabular-nums;}
  .team .pts{font-weight:700;color:var(--ink);}
  .team .form{display:inline-flex;gap:3px;justify-content:flex-end;}
  .fdot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .fdot.W{background:var(--win);} .fdot.D{background:var(--draw);} .fdot.L{background:var(--loss);}
  .fdot.n{width:9px;height:9px;color:var(--muted);font-size:10px;line-height:9px;text-align:center;}

  /* Map */
  #map-wrap{flex:1 1 auto;position:relative;min-width:0;}
  #map{position:absolute;inset:0;background:#aadaff;}
  .map-note{position:absolute;bottom:10px;left:10px;z-index:600;background:rgba(255,255,255,.92);
            border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:11px;color:var(--muted);
            box-shadow:var(--shadow);pointer-events:none;max-width:330px;line-height:1.5;}

  /* Detail panel */
  #detail{position:absolute;top:10px;right:10px;bottom:10px;width:336px;z-index:700;background:var(--panel);
          border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.16);
          display:flex;flex-direction:column;transform:translateX(380px);opacity:0;transition:transform .28s ease,opacity .28s ease;}
  #detail.open{transform:translateX(0);opacity:1;}
  .d-head{display:flex;align-items:center;gap:10px;padding:14px 14px 12px;border-bottom:1px solid var(--line);}
  .d-head img{width:34px;height:24px;border-radius:3px;box-shadow:0 0 0 1px rgba(0,0,0,.1);}
  .d-head .dn{font-size:16px;font-weight:700;line-height:1.15;}
  .d-head .dg{font-size:12px;color:var(--muted);}
  .d-head .x{margin-left:auto;border:0;background:#f3f4f6;border-radius:8px;width:28px;height:28px;cursor:pointer;
             font-size:16px;color:var(--muted);line-height:1;}
  .d-head .x:hover{background:#e5e7eb;}
  .d-body{flex:1 1 auto;overflow-y:auto;padding:12px 14px 16px;}
  .d-stats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .pill{font-size:11px;color:#374151;background:#f3f4f6;border-radius:6px;padding:4px 8px;font-variant-numeric:tabular-nums;}
  .pill b{color:var(--ink);}
  .d-sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
         margin:6px 0 8px;display:flex;align-items:center;gap:8px;}
  .tag{font-weight:600;text-transform:none;letter-spacing:0;font-size:10px;color:#475569;background:#eef2f6;
       border-radius:6px;padding:2px 6px;}
  .bars{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
  .bar-row{display:grid;grid-template-columns:104px 1fr 22px;gap:7px;align-items:center;font-size:12px;}
  .bar-lab{display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-lab img{width:16px;height:12px;border-radius:1px;box-shadow:0 0 0 1px rgba(0,0,0,.1);flex:0 0 auto;}
  .bar-track{background:#f1f2f4;border-radius:5px;height:16px;overflow:hidden;}
  .bar-fill{display:block;height:100%;border-radius:5px;min-width:3px;transition:width .5s ease;}
  .bar-n{text-align:right;font-weight:600;color:#374151;font-variant-numeric:tabular-nums;}
  /* Squad list (detail panel) */
  #dSquad{margin-bottom:6px;}
  .sq-grp{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin:9px 0 2px;}
  .sq-row{display:grid;grid-template-columns:16px minmax(0,1.15fr) minmax(0,0.82fr) 56px;gap:8px;align-items:baseline;padding:3px 1px;font-size:12.5px;}
  .sq-row .sq-no{color:var(--muted);font-size:10.5px;text-align:right;}
  .sq-row .sq-name{color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sq-row .sq-club{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sq-empty{font-size:12px;color:var(--muted);padding:4px 0;}
  /* Salary layer (confidence-tiered) */
  .sq-pay{font-size:11px;text-align:right;font-variant-numeric:tabular-nums;text-decoration:none;color:var(--ink);white-space:nowrap;}
  .sq-pay:hover{text-decoration:underline;}
  .sq-pay.none{color:var(--muted);}
  .cdot{display:inline-block;width:7px;height:7px;border-radius:50%;vertical-align:middle;}
  .sq-pay .cdot{width:6px;height:6px;margin-right:3px;}
  .cdot.a{background:#16a34a;}                       /* Tier A — official/Capology */
  .cdot.b{background:transparent;box-shadow:inset 0 0 0 1.5px #d97706;}  /* Tier B — estimated */
  .wage-head{font-size:15px;font-weight:700;color:var(--ink);margin:2px 0;}
  .wage-head .wmut{font-size:11.5px;font-weight:500;color:var(--muted);}
  .wage-note{font-size:11px;color:var(--muted);font-style:italic;margin:1px 0 2px;}
  .wage-ind{font-size:10.5px;font-weight:600;font-style:italic;color:#b45309;margin:1px 0 3px;}
  .wage-src{font-size:9.5px;color:var(--muted);margin:3px 0 2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
  .fixtures{display:flex;flex-direction:column;gap:6px;}
  .fx{display:grid;grid-template-columns:30px 1fr auto;gap:8px;align-items:center;font-size:12px;
      border:1px solid var(--line);border-radius:8px;padding:7px 9px;}
  .fx .md{color:var(--muted);font-size:11px;}
  .fx .opp{display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fx .opp img{width:18px;height:13px;border-radius:1px;box-shadow:0 0 0 1px rgba(0,0,0,.1);}
  .fx .res{font-weight:700;font-variant-numeric:tabular-nums;}
  .fx .res.W{color:var(--win);} .fx .res.L{color:var(--loss);} .fx .res.D{color:var(--draw);}
  .fx .res.sched{font-weight:500;color:var(--muted);}
  .d-foot{font-size:10px;color:var(--muted);padding:10px 14px;border-top:1px solid var(--line);line-height:1.5;}
  .empty{font-size:12px;color:var(--muted);background:#f9fafb;border:1px dashed var(--line);border-radius:8px;
         padding:12px;line-height:1.5;margin-bottom:16px;}

  .funfact{display:none;font-size:12px;line-height:1.5;color:#3f3f46;background:#f6f3ff;border:1px solid #e7e0fb;
           border-left:3px solid #7c3aed;border-radius:8px;padding:8px 10px 8px 12px;margin:-2px 0 14px;}
  .funfact::before{content:"⚽ ";}

  /* Scorers view */
  #scorer-board, #scorer-nation{display:none;position:absolute;top:10px;bottom:10px;z-index:600;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.16);overflow:auto;}
  #scorer-board{right:10px;width:312px;} #scorer-nation{left:10px;width:320px;}
  body.view-scorers #sidebar, body.view-scorers #detail{display:none;}
  body.view-scorers #scorer-board{display:block;}
  body.view-scorers #scorer-nation.open{display:block;}
  .sp-title{font-size:15px;font-weight:700;padding:14px 14px 2px;}
  .sp-sub{font-size:11px;color:var(--muted);padding:0 14px 10px;border-bottom:1px solid var(--line);}
  .sp-head{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--line);}
  .sp-head img{width:34px;height:24px;border-radius:3px;box-shadow:0 0 0 1px rgba(0,0,0,.1);}
  .sp-head .dn{font-size:16px;font-weight:700;line-height:1.15;} .sp-head .dg{font-size:12px;color:var(--muted);}
  .lb{padding:6px 0 10px;}
  .lb-row{display:grid;grid-template-columns:20px 22px 1fr 58px 22px;gap:8px;align-items:center;padding:7px 12px;cursor:pointer;border-left:3px solid transparent;}
  .lb-row:hover{background:#f7faf8;}
  .lb-row.on{background:#fff7ec;border-left-color:var(--selected);}
  .lb-row:focus-visible{outline:2px solid #93c5fd;outline-offset:-2px;}
  .lb-rank{font-size:12px;color:var(--muted);text-align:center;font-variant-numeric:tabular-nums;}
  .lb-flag{width:22px;height:15px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.08);}
  .lb-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lb-name .lb-nat{display:block;font-size:10px;font-weight:500;color:var(--muted);}
  .lb-bar{background:#f1f2f4;border-radius:5px;height:10px;overflow:hidden;}
  .lb-fill{display:block;height:100%;border-radius:5px;background:var(--selected);}
  .lb-goals{font-size:13px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;}

  /* Bracket view */
  #bracket-view{display:none;position:absolute;inset:0;z-index:500;overflow:auto;background:transparent;padding:16px 20px 30px;}
  body.view-bracket #sidebar{display:none;}
  body.view-bracket #detail:not(.open){display:none !important;}   /* show the nation panel when a bracket team is clicked */
  body.view-bracket #bracket-view{display:block;}
  /* greyed world map shows through as the bracket backdrop */
  body.view-bracket .leaflet-tile-pane{filter:grayscale(1) brightness(1.06) opacity(0.5);}
  body.view-bracket .map-note{display:none;}
  body.view-bracket .leaflet-control-zoom{display:none;}
  /* Scorers view: the nation panel (left:10, width:320) covers the map's left edge,
     so push the zoom control clear of it instead of letting it sit on the flag. */
  body.view-scorers .leaflet-top.leaflet-left{left:340px;}
  .bk-title{font-size:18px;font-weight:700;margin:0 0 14px;letter-spacing:-.2px;
    text-shadow:0 1px 8px rgba(255,255,255,.95),0 0 2px rgba(255,255,255,.95);}
  /* Dark mode: the map behind is dark, so glow dark (not white) and brighten the hint. */
  body.theme-dark .bk-title{text-shadow:0 1px 10px rgba(0,0,0,.92),0 0 3px rgba(0,0,0,.95);}
  .bk-sub{font-weight:500;font-size:13px;color:var(--ink);opacity:.78;}
  .bracket{display:flex;align-items:stretch;gap:12px;min-width:1180px;min-height:740px;position:relative;}
  svg.bk-lines path{stroke:#d1d5db;}
  .bk-half{display:flex;gap:12px;flex:1;}
  .bk-half.right{flex-direction:row-reverse;}
  .bk-col{display:flex;flex-direction:column;flex:1;min-width:120px;}
  .bk-col .bk-h,.bk-center .bk-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:center;padding-bottom:8px;flex:0 0 auto;}
  .bk-matches{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:8px;}
  .bk-center{display:flex;flex-direction:column;justify-content:center;align-items:stretch;min-width:166px;}
  .mbox{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden;position:relative;z-index:1;}
  /* In the bracket, boxes are ~50% transparent so the highlighted nation shows through the map (text stays opaque) */
  body.view-bracket .mbox{background:rgba(255,255,255,.5);}
  body.view-bracket .mdate{background:rgba(245,247,250,.4);}
  body.view-bracket .bk-final-box .mdate{background:rgba(255,247,236,.6);}
  body.theme-dark.view-bracket .mbox{background:rgba(20,28,48,.5);}
  body.theme-dark.view-bracket .mdate{background:rgba(14,22,40,.45);}
  body.theme-dark.view-bracket .bk-final-box .mdate{background:rgba(42,33,18,.6);color:#fcd9a8;}
  /* Clickable match header → head-to-head */
  .mdate.has-h2h{cursor:pointer;}
  .mdate.has-h2h:hover{color:var(--selected);}
  .mdate .h2h-hint{float:right;font-weight:700;letter-spacing:.02em;opacity:.8;}
  .mdate .mvenue{display:block;clear:both;margin-top:1px;font-size:8.5px;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #h2h{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:800;width:min(440px,92vw);
       background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 60px rgba(0,0,0,.45);padding:18px 20px 20px;}
  #h2h.open{display:block;}
  #h2h .x{position:absolute;top:8px;right:12px;border:0;background:transparent;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;}
  .h2h-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:12px;}
  .h2h-teams{display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;font-weight:700;margin-bottom:14px;flex-wrap:wrap;text-align:center;}
  .h2h-teams img{width:30px;height:21px;border-radius:3px;box-shadow:0 0 0 1px rgba(0,0,0,.12);}
  .h2h-teams .vs{color:var(--muted);font-weight:600;font-size:12px;}
  .h2h-fact{font-size:14px;line-height:1.55;color:var(--ink);}
  /* FIFA head-to-head record (pre-baked) + FIFA ranking chips */
  .h2h-rk{font-size:11px;font-weight:700;color:var(--selected);vertical-align:middle;}
  .team .rk{font-size:9.5px;font-weight:700;color:var(--muted);margin-left:4px;vertical-align:middle;}
  .h2h-live{margin-top:13px;}
  .h2h-loading{font-size:13px;color:var(--muted);}
  .h2h-rec{font-size:13.5px;line-height:1.5;color:var(--ink);}
  .h2h-rec.muted{color:var(--muted);font-size:13px;}
  .h2h-tot{margin-bottom:8px;color:var(--muted);}
  .h2h-tot b{color:var(--ink);font-weight:700;}
  .h2h-wdl{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px;
    padding:8px 11px;border-radius:9px;background:rgba(148,163,184,.16);font-weight:700;}
  .h2h-wdl .nm{font-size:12.5px;}
  .h2h-wdl .n{font-size:16px;}
  .h2h-wdl .d{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .h2h-row{display:flex;gap:9px;margin-bottom:5px;}
  .h2h-row .k{color:var(--muted);min-width:74px;flex:0 0 auto;font-size:11px;
    text-transform:uppercase;letter-spacing:.05em;padding-top:2px;}
  .h2h-row b{color:var(--ink);}
  .h2h-pen{color:var(--selected);font-weight:600;white-space:nowrap;}
  .h2h-src{margin-top:11px;font-size:10.5px;color:var(--muted);opacity:.8;line-height:1.4;}
  /* Best third-placed teams card (bracket page) */
  .bk-3rd-chip{margin-left:12px;font:inherit;font-size:12px;font-weight:600;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:999px;padding:4px 12px;cursor:pointer;vertical-align:middle;white-space:nowrap;}
  .bk-3rd-chip:hover{border-color:var(--selected);color:var(--selected);}
  /* same card, opened from the Map tab's sidebar */
  .sb-3rd-chip{display:block;width:100%;margin-top:8px;font:inherit;font-size:12.5px;font-weight:600;
    color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:999px;
    padding:7px 12px;cursor:pointer;transition:border-color .15s,color .15s;}
  .sb-3rd-chip:hover{border-color:var(--selected);color:var(--selected);}
  #third{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:800;width:min(560px,94vw);
    max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 18px 60px rgba(0,0,0,.45);padding:18px 22px 18px;}
  #third.open{display:block;}
  #third .x{position:absolute;top:8px;right:12px;border:0;background:transparent;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;}
  .tp-sub{font-size:12.5px;color:var(--muted);margin-bottom:12px;line-height:1.45;}
  .tp-head,.tp-row{display:grid;grid-template-columns:26px 28px 1fr 38px 32px 40px 36px;gap:9px;align-items:center;}
  .tp-head{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:0 9px 7px;border-bottom:1px solid var(--line);}
  .tp-head span,.tp-row .tp-grp,.tp-row .tp-num,.tp-row .tp-pts{text-align:center;}
  .tp-head .tp-nm{text-align:left;}
  .tp-row{padding:8px 9px;border-radius:9px;font-size:14px;margin-top:2px;}
  .tp-row img{width:24px;height:16px;border-radius:2px;box-shadow:0 0 0 1px rgba(0,0,0,.12);}
  .tp-row .tp-rank{font-weight:700;color:var(--muted);text-align:center;font-size:12.5px;}
  .tp-row .tp-name{font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tp-row .tp-grp,.tp-row .tp-num{color:var(--muted);font-size:13px;}
  .tp-row .tp-pts{font-weight:700;color:var(--ink);}

  .tp-row.q .tp-rank{color:#16a34a;}
  body.theme-dark .tp-row.q{background:rgba(34,197,94,.16);}
  body.theme-dark .tp-row.q .tp-rank{color:#4ade80;}
  .tp-cut{display:flex;align-items:center;gap:8px;margin:9px 2px 3px;font-size:10px;text-transform:uppercase;
    letter-spacing:.06em;color:var(--muted);}
  .tp-cut::before,.tp-cut::after{content:"";flex:1;height:1px;background:var(--line);}
  .tp-row.out{opacity:.5;}
  .tp-foot{margin-top:12px;font-size:10.5px;color:var(--muted);opacity:.8;line-height:1.4;}
  .mdate{font-size:9px;color:var(--muted);padding:3px 8px;border-bottom:1px solid var(--line);background:#fafafa;}
  .mteam{display:flex;align-items:center;gap:7px;padding:7px 9px;font-size:12px;}
  .mteam+.mteam{border-top:1px solid #f1f2f4;}
  .mteam.pick{cursor:pointer;}
  .mteam.pick:hover{background:#eef5ff;}
  .mteam.bkactive{background:#fff7ec;box-shadow:inset 3px 0 0 var(--selected);}
  .mteam img{width:21px;height:15px;border-radius:1px;box-shadow:0 0 0 1px rgba(0,0,0,.1);flex:0 0 auto;}
  .mteam .mc{font-weight:600;}
  .mteam.tbd .mlabel{color:#9aa3af;font-size:11px;}
  .mteam .ms{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:700;color:#374151;}
  .mteam .ms .pens{font-size:9px;font-weight:600;opacity:.7;margin-left:1px;}
  .mteam.win .mc,.mteam.win .ms{color:var(--confirmed);}
  .bk-final-box .mbox{border-color:var(--selected);box-shadow:0 6px 18px rgba(245,158,11,.20);}
  .bk-final-box .mdate{background:#fff7ec;color:#b45309;font-weight:700;}
  .bk-third{margin-top:18px;}
  .bk-third .lab{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:center;padding-bottom:6px;}

  @media (max-width:640px){
    /* Header wraps so the Map / Bracket / Scorers switch is always reachable (it used to
       overflow off-screen on phones). View switch gets its own full-width row. */
    header{flex-wrap:wrap;gap:8px 6px;padding:8px 12px;}
    header .spacer{display:none;}
    header .title{flex:1 1 auto;font-size:15px;order:1;}
    header .title span{display:none;}            /* drop the "· Qualified Nations" subtitle on phones */
    #dataBadge{order:2;font-size:11px;}
    #themeBtn{order:3;} #refreshBtn{order:4;padding:6px 10px;}
    #viewSeg{order:10;flex:1 1 100%;}
    #viewSeg button{flex:1;padding:8px 0;}
    #colourSeg, #visits, #resetBtn{display:none;}   /* non-essential controls hidden on phones */

    main{flex-direction:column;}
    #sidebar{flex:0 0 auto;max-width:none;width:100%;max-height:42%;border-right:0;border-bottom:1px solid var(--line);}
    #detail{top:auto;left:10px;right:10px;width:auto;max-height:62%;transform:translateY(520px);}
    #detail.open{transform:translateY(0);}
    /* Scorers: the two side panels would collide on a phone — make them full-width bottom sheets. */
    #scorer-board, #scorer-nation{left:0;right:0;top:auto;bottom:0;width:auto;max-height:60%;border-radius:14px 14px 0 0;}
    /* The bracket page already scrolls (overflow:auto); the zoom nudge for scorers isn't needed on mobile. */
    body.view-scorers .leaflet-top.leaflet-left{left:0;}
  }

<body>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"

  <script>

  async function loadData() {
    // Fetch each source independently and fall back to its static snapshot per-source, so one
    // flaky endpoint can't blank the dashboard. The bracket / fixtures / scorers need games, so we
    // never ingest empty games on a hiccup — we drop back to the static schedule instead.
    let liveOk = true;
    const get = async (live, fallback) => {
      try { return await fetchJSON(live); }
      catch (e) { liveOk = false; console.warn('Live fetch failed, using static:', live, e); return fetchJSON(fallback); }
    };
    try {
      const [tj, gj, mj] = await Promise.all([
        get(CONFIG.api + '/teams',  CONFIG.staticTeams),
        get(CONFIG.api + '/groups', CONFIG.staticGroups),
        get(CONFIG.api + '/games',  CONFIG.staticGames),
      ]);
      ingest(tj.teams || tj, gj.groups || gj, mj.games || mj);
      isLive = liveOk;
      lastUpdated = (gj.groups || gj).map(g => g.updatedAt).filter(Boolean).sort().pop() || null;
    } catch (e) {
      console.error('All data sources failed.', e); ingest([], [], []);
    }
    await applyFifaBracket();   // FIFA's official knockout assignments override the lagging feed

  // Overlay the knockout bracket (M73–M104) with FIFA's official, up-to-date team assignments +
  // results. worldcup26.ir lags on who has qualified, so we trust FIFA (api.fifa.com is CORS-open)
  // for the bracket; standings / scorers stay on worldcup26.ir. FIFA's MatchNumber == our M-id, and
  // Home/Away.IdCountry == our FIFA code. Additive: if the fetch fails, the feed's bracket remains.
  async function applyFifaBracket() {
    try {
      const url = `${CONFIG.fifaApi}/calendar/matches?idCompetition=${CONFIG.wcCompetition}&idSeason=${CONFIG.wcSeason}&count=200`;
      const results = (await (await fetch(url, { cache:'no-store' })).json()).Results || [];
      for (const m of results) {
        const num = m.MatchNumber;
        if (!num || num < 73) continue;                    // knockout matches only
        const id = String(num);
        const g = gamesById.get(id) || { id, homeId:'0', awayId:'0', hs:0, as:0, finished:false, type:'ko' };
        const ht = teamsByFifa.get((m.Home || {}).IdCountry), at = teamsByFifa.get((m.Away || {}).IdCountry);
        if (ht) g.homeId = ht.id;
        if (at) g.awayId = at.id;
        const hs = (m.Home || {}).Score, as = (m.Away || {}).Score;
        if (hs != null && as != null) { g.hs = hs; g.as = as; g.finished = true; }
        const hp = m.HomeTeamPenaltyScore, ap = m.AwayTeamPenaltyScore;
        if (hp != null && ap != null) { g.hp = hp; g.ap = ap; }   // penalty-shootout scoreline
        if (m.Date) g.ko = m.Date;                                 // UTC kickoff — localised in the browser
        const st = m.Stadium || {};
        const venue = [locName(st.Name), locName(st.CityName)].filter(Boolean).join(', ');
        if (venue) g.venue = venue;
        gamesById.set(id, g);
      }
      thirdPlaceRanking = computeThirdPlace(results);       // the best-third-placed-teams card
    } catch (e) { console.warn('FIFA bracket overlay failed — keeping worldcup26.ir bracket.', e); }
  }

  // Best third-placed teams: tally each group from FIFA's played group matches, take the 3rd-placed
  // side from all 12 groups and rank them (points, then goal difference, then goals for). The top 8
  // of 12 reach the Round of 32. (Exact order of ties may differ from FIFA's deeper tiebreakers.)
  function computeThirdPlace(results) {
    const tab = {};   // group -> { fifa -> {pts,gd,gf,gp} }
    for (const m of results) {
      if ((m.MatchNumber || 0) >= 73) continue;            // group stage only
      const H = m.Home || {}, A = m.Away || {};
      const hs = H.Score, as = A.Score;
      if (hs == null || as == null) continue;              // unplayed
      const grp = ((m.GroupName || [])[0] || {}).Description || '';
      const t = (tab[grp] = tab[grp] || {});
      for (const [c, gf, ga] of [[H.IdCountry, hs, as], [A.IdCountry, as, hs]]) {
        if (!c) continue;
        const r = (t[c] = t[c] || { pts:0, gd:0, gf:0, gp:0 });
        r.gd += gf - ga; r.gf += gf; r.gp++; r.pts += gf > ga ? 3 : gf === ga ? 1 : 0;
      }
    }
    const thirds = [];
    for (const grp in tab) {
      const ranked = Object.entries(tab[grp])
        .sort((a, b) => b[1].pts - a[1].pts || b[1].gd - a[1].gd || b[1].gf - a[1].gf);
      if (ranked.length >= 3) thirds.push({ fifa: ranked[2][0], group: grp.replace('Group ', ''), ...ranked[2][1] });
    }
    thirds.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    thirds.forEach((t, i) => t.qualifies = i < 8);
    return thirds;
  }

  function ingest(teams, groups, games) {
    teamsById.clear(); teamsByFifa.clear(); teamsByIso3.clear(); gamesByTeam.clear(); gamesById.clear();
    for (const t of teams) {
      const iso3 = toIso3(t.fifa_code);
      const rec = { id:String(t.id), name:t.name_en, fifa:t.fifa_code, iso2:t.iso2, iso3,
                    flag:t.flag, group:t.groups };
      teamsById.set(rec.id, rec);
      teamsByFifa.set(rec.fifa, rec);
      if (!teamsByIso3.has(iso3)) teamsByIso3.set(iso3, []);
      teamsByIso3.get(iso3).push(rec);
    }
    for (const g of games) {
      const game = { id:String(g.id), homeId:String(g.home_team_id), awayId:String(g.away_team_id),
                     hs:num(g.home_score), as:num(g.away_score), finished:String(g.finished).toUpperCase()==='TRUE',
                     group:g.group, matchday:g.matchday, date:g.local_date, key:dateKey(g.local_date),
                     homeName:g.home_team_name_en, awayName:g.away_team_name_en, type:g.type };
      gamesById.set(game.id, game);
      for (const id of [game.homeId, game.awayId]) {
        if (!gamesByTeam.has(id)) gamesByTeam.set(id, []);
        gamesByTeam.get(id).push(game);
      }
    }
    const byName = {};
    for (const grp of groups) {
      byName[grp.name] = (grp.teams || []).map(s => {
        const rec = teamsById.get(String(s.team_id)) || { id:String(s.team_id), name:'#'+s.team_id, iso3:'', group:grp.name };
        return { ...rec, mp:num(s.mp), w:num(s.w), d:num(s.d), l:num(s.l),
                 gf:num(s.gf), ga:num(s.ga), gd:num(s.gd), pts:num(s.pts), tcs:null };
      });
    }
    groupsOrdered = Object.keys(byName).sort().map(n => [n, byName[n]]);
    parseScorers(games);
  }

    if (colourMode==='single') return CONFIG.style.single;
    const m = metaByIso3.get(iso3);
    return (m && CONTINENT_COLOURS[m.continent]) ? CONTINENT_COLOURS[m.continent] : CONFIG.style.single;
  }
  function styleFor(f) {
    const iso3 = getIso3(f);
    if (document.body.classList.contains('view-bracket')) {       // greyed backdrop; only the picked nation pops
      if (iso3===bkHi) return CONFIG.style.selected;
      return isQualified(iso3) ? CONFIG.style.muted : baseStyle();
    }
    if (iso3===selIso3()) return CONFIG.style.selected;
    if (!isQualified(iso3)) return baseStyle();
    return { color:'#ffffff', weight:0.8, fillColor:fillFor(iso3), fillOpacity:0.62 };
  }
  const selIso3 = () => { const r = teamsById.get(selectedId); return r ? r.iso3 : null; };

  // Bounds of a feature's largest landmass — so the USA zooms to the contiguous mainland
  // (not Alaska/Hawaii), France to metropolitan France, Ecuador to the mainland, etc.
  function ringArea(ring){ let a=0; for (let i=0,j=ring.length-1;i<ring.length;j=i++){ a += ring[j][0]*ring[i][1]-ring[i][0]*ring[j][1]; } return Math.abs(a/2); }
  function mainlandBounds(f, fullBounds){
    const g = f.geometry; if (!g || g.type!=='MultiPolygon') return fullBounds;
    let best=null, bestA=-1;
    for (const poly of g.coordinates){ const a=ringArea(poly[0]); if (a>bestA){ bestA=a; best=poly[0]; } }
    if (!best) return fullBounds;
    const lats=best.map(c=>c[1]), lngs=best.map(c=>c[0]);
    return L.latLngBounds([Math.min(...lats),Math.min(...lngs)],[Math.max(...lats),Math.max(...lngs)]);
  }

  async function loadBoundaries() {
    let data;
    try { const r = await fetch(CONFIG.geojsonUrl); if (!r.ok) throw new Error('HTTP '+r.status); data = await r.json(); }
    catch (e) { console.warn('Primary GeoJSON failed, trying fallback…', e); data = await (await fetch(CONFIG.geojsonFallback)).json(); }

    const eachBoundary = (f, layer) => {
      const iso3 = getIso3(f);
      if (!isQualified(iso3)) return;
      layerByIso3.set(iso3, layer);
      metaByIso3.set(iso3, { continent:(f.properties||{}).CONTINENT, pop:(f.properties||{}).POP_EST });
      mainBoundsByIso3.set(iso3, mainlandBounds(f, layer.getBounds()));
      layer.on('mouseover', () => { if (iso3!==selIso3()) layer.setStyle({ fillOpacity:0.82 }); });
      layer.on('mouseout',  () => { if (iso3!==selIso3()) layer.setStyle(styleFor(f)); });
      layer.on('click', () => {
        const recs = teamsByIso3.get(iso3); if (!recs || !recs[0]) return;
        if (document.body.classList.contains('view-scorers')) selectScorerNation(recs[0].id);
        else if (!document.body.classList.contains('view-bracket')) selectTeam(recs[0].id);
      });
    };

    geoLayer = L.geoJSON(data, {
      style: styleFor,
      filter: (f) => getIso3(f) !== 'GBR',          // UK drawn as 4 home-nation polygons instead
      onEachFeature: eachBoundary,
    }).addTo(map);

    // England, Scotland, Wales & Northern Ireland as separate polygons
    try {
      const uk = await (await fetch(CONFIG.ukUnitsUrl)).json();
      ukLayer = L.geoJSON(uk, { style: styleFor, onEachFeature: eachBoundary }).addTo(map);
    } catch (e) { console.warn('UK home-nation boundaries failed to load.', e); }

    restyleAll();   // metaByIso3 is now populated → apply continent colours
  }
  function restyleAll() { if (geoLayer) geoLayer.setStyle(styleFor); if (ukLayer) ukLayer.setStyle(styleFor); }

  // ===================================================================
  //  SELECTION + DETAIL PANEL
  // ===================================================================
  function selectTeam(id) {
    const rec = teamsById.get(id); if (!rec) return;
    const prevIso = selIso3();
    selectedId = id;
    if (prevIso && layerByIso3.has(prevIso)) layerByIso3.get(prevIso).setStyle(styleFor({ properties:{ ADM0_A3:prevIso } }));

    document.querySelectorAll('#groups .team').forEach(el => el.classList.remove('active'));
    const row = document.querySelector(`#groups .team[data-id="${id}"]`);
    if (row) { row.classList.add('active'); row.scrollIntoView({ block:'nearest', behavior:'smooth' }); }

    const layer = layerByIso3.get(rec.iso3);
    if (layer) {
      layer.setStyle(CONFIG.style.selected); layer.bringToFront();
      // Pad the right for the detail panel, but scale to map width so narrow maps still zoom in.
      const w = map.getSize().x;
      const rightPad = Math.round(Math.min(310, Math.max(20, w * 0.38)));
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const zoomBounds = mainBoundsByIso3.get(rec.iso3) || layer.getBounds();
      map.flyToBounds(zoomBounds,
        { paddingTopLeft:[28,28], paddingBottomRight:[rightPad,28], maxZoom:6, duration:1.1, animate:!reduce });
    } else { console.warn('No polygon for', rec.iso3); }
    renderDetail(rec);
  }

  function standingRow(id) {
    for (const [g, rows] of groupsOrdered) { const i = rows.findIndex(r => r.id===id); if (i>=0) return { row:rows[i], pos:i+1, group:g }; }
    return null;
  }

  // Lazy-load the baked 26-man squads (player · position · club + coach), once.
  async function loadSquads() {
    if (squadsData) return;
    try { squadsData = await (await fetch(CONFIG.squads)).json(); }
    catch (e) { console.warn('Squads load failed', e); squadsData = {}; }
  }

  // Lazy-load the confidence-tiered salaries, once; index each team's players by name.
  async function loadSalaries() {
    if (salariesData) return;
    try {
      const d = await (await fetch(CONFIG.salaries)).json();
      for (const fc in d.teams) {
        const t = d.teams[fc]; t.byName = {};
        for (const p of t.players) t.byName[p.n] = p;
      }
      salariesData = d;
    } catch (e) { console.warn('Salaries load failed', e); salariesData = { teams: {} }; }
  }
  const fmtEur = (v) => v >= 1e6 ? '€' + (v / 1e6).toFixed(1) + 'm'
    : v >= 1e3 ? '€' + Math.round(v / 1e3) + 'k' : '€' + v;
  const SQ_GROUPS = [['GK','Goalkeepers'],['DF','Defenders'],['MF','Midfielders'],['FW','Forwards']];
  function renderSquadSection(rec) {
    const box = document.getElementById('dSquad'), coachTag = document.getElementById('dCoach');
    const sq = squadsData && squadsData[rec.fifa];
    const stillHere = () => selectedId === rec.id && document.getElementById('detail').classList.contains('open');
    if (!sq) {
      coachTag.textContent = '';
      box.innerHTML = `<div class="sq-empty">${squadsData ? 'Squad not available.' : 'Loading squad…'}</div>`;
      if (!squadsData) Promise.all([loadSquads(), loadSalaries()]).then(() => {   // first open — fetch, then repaint
        if (stillHere()) renderSquadSection(rec);
      });
      return;
    }
    coachTag.textContent = sq.coach ? 'Coach: ' + sq.coach : '';
    if (!salariesData) loadSalaries().then(() => { if (stillHere()) renderSquadSection(rec); });  // wages fill in on load
    const sal = salariesData && salariesData.teams && salariesData.teams[rec.fifa];
    const pay = (p) => {                                  // per-player estimated wage + confidence dot
      const e = sal && sal.byName[p.n];
      if (!e) return `<span class="sq-pay none">N/A</span>`;
      const off = e.source_name === 'MLSPA' ? ' (official)' : '';
      return `<a class="sq-pay" href="${e.source_url}" target="_blank" rel="noopener"`
        + ` title="${e.source_name} · Tier ${e.confidence}${off}"><i class="cdot ${(e.confidence || '').toLowerCase()}"></i>${fmtEur(e.eur)}</a>`;
    };
    const row = (p) => `<div class="sq-row"><span class="sq-no">${p.no || ''}</span>
      <span class="sq-name">${p.n}</span><span class="sq-club">${p.c || ''}</span>${pay(p)}</div>`;
    let html = '';
    for (const [pos, label] of SQ_GROUPS) {
      const ps = sq.players.filter(p => p.p === pos);
      if (ps.length) html += `<div class="sq-grp">${label}</div>` + ps.map(row).join('');
    }
    const other = sq.players.filter(p => !SQ_GROUPS.some(g => g[0] === p.p));
    if (other.length) html += `<div class="sq-grp">Squad</div>` + other.map(row).join('');
    box.innerHTML = html || `<div class="sq-empty">Squad not available.</div>`;
  }

  // Team wage-bill headline (est.) — combined/avg priced wages + honest coverage + source key.
  function renderWages(rec) {
    const el = document.getElementById('dWages');
    const sal = salariesData && salariesData.teams && salariesData.teams[rec.fifa];
    if (!sal) {                                            // not loaded yet (or no data) — fill in on load
      el.innerHTML = '';
      if (!salariesData) loadSalaries().then(() => {
        if (selectedId === rec.id && document.getElementById('detail').classList.contains('open')) renderWages(rec);
      });
      return;
    }
    const avg = sal.priced ? Math.round(sal.total / sal.priced) : 0;
    const low = sal.priced < 8;
    el.innerHTML =
      `<div class="d-sec" style="margin-top:6px">💰 Squad wages</div>`
      + (sal.priced
        ? `<div class="wage-head">${fmtEur(sal.total)} <span class="wmut">total · ${fmtEur(avg)} avg (priced)</span></div>`
          + `<div class="wage-ind">≈ Indicative estimates only — not official figures.</div>`
        : `<div class="wage-note">No public wage data for this squad's leagues.</div>`)
      + (low && sal.priced ? `<div class="wage-note">Most of this squad plays in leagues with no public wage data.</div>` : '')
      + `<div class="wage-src">Wage source: <i class="cdot a"></i> MLSPA / Capology · <i class="cdot b"></i> FootyStats / media</div>`;
  }

  function renderDetail(rec) {
    const s = standingRow(rec.id); const r = s ? s.row : rec;
    document.getElementById('dFlag').src = rec.flag;
    document.getElementById('dName').textContent = rec.name;
    const meta = metaByIso3.get(rec.iso3) || {};
    const popTxt = meta.pop ? ' · Pop ' + fmtPop(meta.pop) : '';
    const rankTxt = rankOf(rec.fifa) ? ` · FIFA #${rankOf(rec.fifa)}` : '';
    document.getElementById('dGroup').textContent = `Group ${rec.group}${s ? ' · '+ordinal(s.pos)+' place' : ''}${rankTxt}${popTxt}`;
    document.getElementById('dStats').innerHTML = s ? `
      <span class="pill">P <b>${r.mp}</b></span><span class="pill">W <b>${r.w}</b></span>
      <span class="pill">D <b>${r.d}</b></span><span class="pill">L <b>${r.l}</b></span>
      <span class="pill">GF <b>${r.gf}</b></span><span class="pill">GA <b>${r.ga}</b></span>
      <span class="pill">GD <b>${sign(r.gd)}</b></span><span class="pill">Pts <b>${r.pts}</b></span>` : '';
    const fact = FUN_FACTS[rec.fifa]; const factEl = document.getElementById('dFact');
    if (fact) { factEl.style.display = 'block'; factEl.textContent = fact; } else { factEl.style.display = 'none'; }

    // bar chart
    const data = SQUAD_LEAGUES[rec.fifa];
    const chart = document.getElementById('dChart');
    if (data && data.length) {
      const all = [...data].sort((a,b)=>b.n-a.n);
      const TOP = 8; let rows = all;
      if (all.length > TOP) {
        const restN = all.slice(TOP).reduce((s,d)=>s+d.n,0);
        rows = all.slice(0,TOP).concat([{ lg:`Other · ${all.length-TOP} leagues`, c:'', n:restN, other:true }]);
      }
      const max = Math.max(...rows.map(d=>d.n));
      const col = CONTINENT_COLOURS[(metaByIso3.get(rec.iso3)||{}).continent] || CONFIG.style.single;
      const total = all.reduce((s,d)=>s+d.n,0);
      chart.innerHTML = `<div class="bars">` + rows.map(d => `
        <div class="bar-row">
          <span class="bar-lab">${d.other?'':`<img src="https://flagcdn.com/24x18/${d.c}.png" alt="">`}${d.lg}</span>
          <span class="bar-track"><span class="bar-fill" style="width:${Math.round(d.n/max*100)}%;background:${d.other?'#cbd5e1':col}"></span></span>
          <span class="bar-n">${d.n}</span>
        </div>`).join('') + `</div><div style="font-size:10px;color:var(--muted);margin:-8px 0 14px">${total} squad players · ${all.length} leagues</div>`;
    } else {
      chart.innerHTML = `<div class="empty">Squad-league breakdown for <b>${rec.name}</b> isn't wired yet.
        Plug a squad source (e.g. API-Football <code>/players/squads</code>) into <code>SQUAD_LEAGUES['${rec.fifa}']</code>.</div>`;
    }

    renderWages(rec);
    renderSquadSection(rec);

    // fixtures
    const fx = (gamesByTeam.get(rec.id) || []).filter(g => g.type==='group').slice().sort((a,b)=>a.key.localeCompare(b.key));
    const fxEl = document.getElementById('dFixtures');
    fxEl.innerHTML = fx.length ? fx.map(g => {
      const home = g.homeId===rec.id; const oppId = home?g.awayId:g.homeId;
      const opp = teamsById.get(oppId) || { name: (home?g.awayName:g.homeName) || 'TBD', flag:'' };
      let res;
      if (g.finished) { const gf=home?g.hs:g.as, ga=home?g.as:g.hs; const o=gf>ga?'W':gf<ga?'L':'D';
        res = `<span class="res ${o}">${gf}–${ga}</span>`; }
      else res = `<span class="res sched">${dateLabel(g.date)||'TBD'}</span>`;
      return `<div class="fx"><span class="md">MD${g.matchday}</span>
        <span class="opp"><img src="${opp.flag}" alt="">${home?'':'@ '}${opp.name}</span>${res}</div>`;
    }).join('') : `<div class="empty">No fixtures available${isLive?'':' (static fallback — start the live API for fixtures)'}.</div>`;

    document.getElementById('dFoot').innerHTML =
      `Standings &amp; fixtures: live · worldcup26.ir. Squad leagues: Wikipedia 2026 WC squads (by club country). `
      + `Wages (indicative est.): MLSPA (official) · Capology · FootyStats · media reports. Population: Natural Earth.`;
    document.getElementById('detail').classList.add('open');
  }
  const ordinal = (n) => n+({1:'st',2:'nd',3:'rd'}[n]||'th');
  const fmtPop = (n) => n>=1e9 ? (n/1e9).toFixed(2)+'B' : n>=1e6 ? (n/1e6).toFixed(1)+'M' : n>=1e3 ? Math.round(n/1e3)+'K' : ''+n;

  function closeDetail() {
    document.getElementById('detail').classList.remove('open');
    const iso = selIso3();
    selectedId = null;
    if (iso && layerByIso3.has(iso)) layerByIso3.get(iso).setStyle(styleFor({ properties:{ ADM0_A3:iso } }));
    document.querySelectorAll('#groups .team').forEach(el => el.classList.remove('active'));
  }
  function resetView() { closeDetail(); map.flyTo([18,-35], 2.4, { duration:1.0 }); }

  function updateBadge() {
    const b = document.getElementById('dataBadge');
    b.className = 'badge ' + (isLive ? 'live' : 'mock');
    let txt = isLive ? 'Live' : 'Static fallback';
    if (isLive && lastUpdated) { try { txt += ' · ' + new Date(lastUpdated).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); } catch(e){} }
    document.getElementById('dataBadgeText').textContent = txt;
    document.getElementById('mapNote').innerHTML =
      `48 teams · 12 groups · click a nation to zoom in<br>` +
      `Tiles © OpenStreetMap, © CARTO · Boundaries: Natural Earth 1:50m · Data: worldcup26.ir<br>` +
      `CRS: EPSG:3857 (tiles) / EPSG:4326 (data) · ${new Date().toLocaleDateString('en-GB')}<br>` +
      `Unofficial fan project — not affiliated with or endorsed by FIFA.`;
  }

  // ===================================================================
  //  BOOT
  // ===================================================================
  // ===================================================================
  //  KNOCKOUT BRACKET — structure from the official 2026 bracket
  //  (Wikipedia RoundN); live teams + scores joined from the API by match id.
  // ===================================================================
  const ROUND_H = { r32:'Round of 32', r16:'Round of 16', qf:'Quarter-final', sf:'Semi-final' };
  const BK_LEFT  = { r32:[74,77,73,75,83,84,81,82], r16:[89,90,93,94], qf:[97,98], sf:[101] };
  const BK_RIGHT = { r32:[76,78,79,80,86,88,85,87], r16:[91,92,95,96], qf:[99,100], sf:[102] };
  const BK_FINAL = 104, BK_THIRD = 103;
  const FEEDERS = {
    74:['1E','3rd A/B/C/D/F'], 77:['1I','3rd C/D/F/G/H'], 73:['2A','2B'], 75:['1F','2C'],
    83:['2K','2L'], 84:['1H','2J'], 81:['1D','3rd B/E/I'], 82:['1G','3rd A/E/H/I/J'],
    76:['1C','2F'], 78:['2E','2I'], 79:['1A','3rd C/E/F/H/I'], 80:['1L','3rd E/H/I/J/K'],
    86:['1J','2H'], 88:['2D','2G'], 85:['1B','3rd E/F/G/I/J'], 87:['1K','3rd D/E/I/J/L'],
    89:['W74','W77'], 90:['W73','W75'], 93:['W83','W84'], 94:['W81','W82'],
    91:['W76','W78'], 92:['W79','W80'], 95:['W86','W88'], 96:['W85','W87'],
    97:['W89','W90'], 98:['W93','W94'], 99:['W91','W92'], 100:['W95','W96'],
    101:['W97','W98'], 102:['W99','W100'], 104:['W101','W102'], 103:['L101','L102'],
  };

  // FIFA stores names as [{Locale, Description}] — pick the en-GB (or first) description.
  const locName = (arr) => Array.isArray(arr) ? ((arr.find(x => x && x.Locale === 'en-GB') || arr[0] || {}).Description || '') : '';
  // Kickoff (FIFA's UTC ISO) rendered in the VIEWER's local timezone — "29 Jun · 21:30".
  function koLabel(iso) {
    if (!iso) return '';
    const d = new Date(iso); if (isNaN(d)) return '';
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' · '
         + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }
  // The viewer's local timezone abbreviation (e.g. BST, EDT) — shown once in the bracket subtitle.
  function viewerTz() {
    try {
      return (new Intl.DateTimeFormat('en-GB', { hour: '2-digit', timeZoneName: 'short' })
        .formatToParts(new Date()).find(p => p.type === 'timeZoneName') || {}).value || '';
    } catch (e) { return ''; }
  }
  function bkSlot(teamId, feeder, score, pen, isWin, finished) {
    const t = teamsById.get(String(teamId));
    if (t) {
      const sc = finished ? (pen != null ? `${score} <span class="pens">(${pen})</span>` : `${score}`) : '';
      return `<div class="mteam pick ${isWin?'win':''}" data-team="${t.id}" title="${t.name}">
        <img src="${t.flag}" alt=""><span class="mc">${t.fifa}</span><span class="ms">${sc}</span></div>`;
    }
    return `<div class="mteam tbd"><span class="mlabel">${feeder}</span><span class="ms"></span></div>`;
  }
  function matchBox(id) {
    const g = gamesById.get(String(id)); const [fh,fa] = FEEDERS[id] || ['',''];
    const fin = g ? g.finished : false; const hs = g?g.hs:'', as = g?g.as:'';
    const hp = (g && g.hp != null) ? g.hp : null, ap = (g && g.ap != null) ? g.ap : null;
    const shoot = fin && hp != null && ap != null;          // tie decided on penalties
    const homeWin = fin && (hs > as || (shoot && hp > ap)); // shootout winner advances even on a drawn scoreline
    const awayWin = fin && (as > hs || (shoot && ap > hp));
    const when = (g && koLabel(g.ko)) || (g ? dateLabel(g.date) : '') || ('M' + id);
    const venue = g && g.venue ? g.venue : '';
    const both = g && teamsById.has(String(g.homeId)) && teamsById.has(String(g.awayId));  // both teams placed → head-to-head
    return `<div class="mbox ${fin?'fin':''}" data-mid="${id}">
      <div class="mdate${both?' has-h2h':''}"${both?` data-h2h="${id}"`:''}>${both?'<span class="h2h-hint">⚔ H2H</span>':''}${when}${shoot?' · pens':''}${venue?`<span class="mvenue">📍 ${venue}</span>`:''}</div>
      ${bkSlot(g&&g.homeId, fh, hs, shoot?hp:null, homeWin, fin)}
      ${bkSlot(g&&g.awayId, fa, as, shoot?ap:null, awayWin, fin)}</div>`;
  }
  const bkCol = (round, ids) => `<div class="bk-col"><div class="bk-h">${ROUND_H[round]}</div>
    <div class="bk-matches">${ids.map(matchBox).join('')}</div></div>`;
  const bkHalf = (cls, d) => `<div class="bk-half ${cls}">${bkCol('r32',d.r32)}${bkCol('r16',d.r16)}${bkCol('qf',d.qf)}${bkCol('sf',d.sf)}</div>`;

  function buildBracket() {
    const centre = `<div class="bk-center"><div class="bk-h">Final</div>
      <div class="bk-final-box">${matchBox(BK_FINAL)}</div>
      <div class="bk-third"><div class="lab">Match for third place</div>${matchBox(BK_THIRD)}</div></div>`;
    const tz = viewerTz();
    document.getElementById('bracket-view').innerHTML =
      `<h2 class="bk-title">Knockout bracket
        <span class="bk-sub">· bold = winner · click a team for its details · click ⚔ H2H · kick-offs in your local time${tz?` (${tz})`:''}</span>
        <button class="bk-3rd-chip" id="thirdChip">🥉 3rd-place race</button></h2>
      <div class="bracket">${bkHalf('left',BK_LEFT)}${centre}${bkHalf('right',BK_RIGHT)}</div>`;
    drawConnectors();
  }

  // Receiver match id -> its two feeder match ids (for drawing the elbow connectors).
  const BK_FEEDS = { 89:[74,77],90:[73,75],93:[83,84],94:[81,82],91:[76,78],92:[79,80],95:[86,88],96:[85,87],
                     97:[89,90],98:[93,94],99:[91,92],100:[95,96],101:[97,98],102:[99,100],104:[101,102] };
  function drawConnectors() {
    const wrap = document.querySelector('#bracket-view .bracket'); if (!wrap) return;
    const old = wrap.querySelector('svg.bk-lines'); if (old) old.remove();
    const wr = wrap.getBoundingClientRect(); if (!wr.width) return;
    const NS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(NS,'svg'); svg.setAttribute('class','bk-lines');
    svg.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:0;';
    const boxOf = id => wrap.querySelector('.mbox[data-mid="'+id+'"]');
    for (const rid in BK_FEEDS) {
      const rEl = boxOf(rid); if (!rEl) continue; const r = rEl.getBoundingClientRect();
      for (const fid of BK_FEEDS[rid]) {
        const fEl = boxOf(fid); if (!fEl) continue; const f = fEl.getBoundingClientRect();
        const leftHalf = f.right <= r.left + 1;
        const fx = (leftHalf?f.right:f.left) - wr.left, fy = f.top + f.height/2 - wr.top;
        const rx = (leftHalf?r.left:r.right) - wr.left, ry = r.top + r.height/2 - wr.top;
        const mx = (fx + rx) / 2;
        const p = document.createElementNS(NS,'path');
        p.setAttribute('d', 'M'+fx+' '+fy+' H'+mx+' V'+ry+' H'+rx);
        p.setAttribute('fill','none'); p.setAttribute('stroke-width','1.5');
        svg.appendChild(p);
      }
    }
    wrap.insertBefore(svg, wrap.firstChild);
  }

  // ===================================================================
  //  GOAL SCORERS — parsed from the scorer fields in /games
  // ===================================================================
  function parseScorers(games) {
    topScorers = []; scorersByTeam.clear();
    const cleanName = (e) => e.split(/\s*\d/)[0].trim();                 // name = text before the first digit (minute)
    const parseList = (s) => (!s || String(s).toLowerCase()==='null') ? []
      : (String(s).match(/"([^"]*)"/g) || []).map(x => x.slice(1, -1));
    const byTeam = new Map();                                           // teamId -> Map(surname|team -> {name,goals})
    for (const g of (games || [])) {
      if (String(g.finished).toUpperCase() !== 'TRUE') continue;
      for (const [side, tid] of [['home_scorers', String(g.home_team_id)], ['away_scorers', String(g.away_team_id)]]) {
        for (const e of parseList(g[side])) {
          if (/\(og\)/i.test(e)) continue;                              // own goals aren't credited to the scorer
          const name = cleanName(e); if (!name) continue;
          const key = name.split(/\s+/).pop().toLowerCase() + '|' + tid; // aggregate by surname + team
          if (!byTeam.has(tid)) byTeam.set(tid, new Map());
          const m = byTeam.get(tid), cur = m.get(key) || { name, goals:0 };
          cur.goals++; if (name.length > cur.name.length) cur.name = name; // keep the fullest spelling seen
          m.set(key, cur);
        }
      }
    }
    for (const [tid, m] of byTeam) {
      const arr = [...m.values()].sort((a,b)=>b.goals-a.goals);
      scorersByTeam.set(tid, arr);
      for (const p of arr) topScorers.push({ name:p.name, goals:p.goals, teamId:tid });
    }
    topScorers.sort((a,b) => b.goals-a.goals || a.name.localeCompare(b.name));
  }

  const continentColourOf = (iso3) => {
    const m = metaByIso3.get(iso3);
    return (m && CONTINENT_COLOURS[m.continent]) ? CONTINENT_COLOURS[m.continent] : CONFIG.style.single;
  };

  function buildLeaderboard() {
    const top = topScorers.slice(0, 25), max = top.length ? top[0].goals : 1;
    document.getElementById('scorer-board').innerHTML = `<div class="sp-title">⚽ Golden Boot race</div>
      <div class="sp-sub">Top scorers · live from match data · click a player</div>
      <div class="lb">` + (top.length ? top.map((p,i) => {
        const t = teamsById.get(String(p.teamId)) || {};
        return `<div class="lb-row" data-team="${p.teamId}" role="button" tabindex="0" title="${t.name||''}">
          <span class="lb-rank">${i+1}</span><img class="lb-flag" src="${t.flag||''}" alt="" loading="lazy">
          <span class="lb-name">${p.name}<span class="lb-nat">${t.name||''}</span></span>
          <span class="lb-bar"><span class="lb-fill" style="width:${Math.round(p.goals/max*100)}%"></span></span>
          <span class="lb-goals">${p.goals}</span></div>`;
      }).join('') : `<div class="empty" style="margin:12px">No goals recorded yet.</div>`) + `</div>`;
  }

  function renderNationScorers(id) {
    const rec = teamsById.get(String(id)); if (!rec) return;
    const arr = scorersByTeam.get(String(id)) || [], max = arr.length ? arr[0].goals : 1;
    const col = continentColourOf(rec.iso3), total = arr.reduce((s,p)=>s+p.goals,0);
    const el = document.getElementById('scorer-nation');
    el.innerHTML = `<div class="sp-head"><img src="${rec.flag}" alt="">
        <div><div class="dn">${rec.name}</div><div class="dg">Goalscorers · ${total} goal${total===1?'':'s'}</div></div></div>`
      + (arr.length ? `<div class="bars" style="padding:12px 14px 16px">` + arr.map(p => `
          <div class="bar-row"><span class="bar-lab" title="${p.name}">${p.name}</span>
          <span class="bar-track"><span class="bar-fill" style="width:${Math.round(p.goals/max*100)}%;background:${col}"></span></span>
          <span class="bar-n">${p.goals}</span></div>`).join('') + `</div>`
        : `<div class="empty" style="margin:14px">No goals yet for ${rec.name}.</div>`);
    el.classList.add('open');
  }

  function selectScorerNation(id) {
    const rec = teamsById.get(String(id)); if (!rec) return;
    const prevIso = selIso3(); selectedId = id;
    if (prevIso && prevIso!==rec.iso3 && layerByIso3.has(prevIso)) layerByIso3.get(prevIso).setStyle(styleFor({ properties:{ ADM0_A3:prevIso } }));
    const layer = layerByIso3.get(rec.iso3);
    if (layer) {
      layer.setStyle(CONFIG.style.selected); layer.bringToFront();
      const w = map.getSize().x, reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const lp = Math.round(Math.min(330, Math.max(20, w*0.30))), rp = Math.round(Math.min(310, Math.max(20, w*0.28)));
      map.flyToBounds(mainBoundsByIso3.get(rec.iso3) || layer.getBounds(),
        { paddingTopLeft:[lp,28], paddingBottomRight:[rp,28], maxZoom:6, duration:1.0, animate:!reduce });
    }
    document.querySelectorAll('#scorer-board .lb-row.on').forEach(e => e.classList.remove('on'));
    document.querySelectorAll(`#scorer-board .lb-row[data-team="${id}"]`).forEach(e => e.classList.add('on'));
    renderNationScorers(id);
  }

  function setView(v) {
    document.querySelectorAll('#viewSeg button').forEach(x => x.classList.toggle('on', x.dataset.view===v));
    document.body.classList.toggle('view-bracket', v==='bracket');
    document.body.classList.toggle('view-scorers', v==='scorers');
    document.getElementById('colourSeg').style.display = v==='map' ? '' : 'none';
    closeH2H(); closeThird();
    if (v==='bracket') {
      buildBracket();
      if (map) { map.invalidateSize(); map.setView([20,0], 2, { animate:false }); }
    } else if (v==='scorers') {
      buildLeaderboard();
      if (map) { map.invalidateSize(); map.setView([25,0], 2, { animate:false }); }
    } else if (map) {
      map.invalidateSize();
    }
    restyleAll();   // muted-grey backdrop in bracket view; continent colours elsewhere
  }

  // Bracket click: highlight the nation on the backdrop map, no zoom, stay in the bracket.
  function highlightNation(id) {
    const rec = teamsById.get(String(id)); if (!rec) return;
    const prev = bkHi; bkHi = rec.iso3;
    if (prev && prev!==bkHi && layerByIso3.has(prev)) layerByIso3.get(prev).setStyle(styleFor({ properties:{ ADM0_A3:prev } }));
    const layer = layerByIso3.get(rec.iso3);
    if (layer) { layer.setStyle(CONFIG.style.selected); layer.bringToFront(); }
    document.querySelectorAll('#bracket-view .mteam.bkactive').forEach(e => e.classList.remove('bkactive'));
    document.querySelectorAll('#bracket-view .mteam.pick[data-team="'+id+'"]').forEach(e => e.classList.add('bkactive'));
  }

  // Bracket: clicking a team highlights it, opens the same nation panel as the map view
  // (stats / squad / fixtures), AND zooms the greyed backdrop map to that nation.
  function bracketSelectTeam(id) {
    const rec = teamsById.get(String(id)); if (!rec) return;
    selectedId = String(id);
    highlightNation(id);
    renderDetail(rec);          // populates #detail and adds .open
    const layer = layerByIso3.get(rec.iso3);   // zoom the greyed backdrop to the clicked nation
    if (map && layer) {
      const w = map.getSize().x;
      const rightPad = Math.round(Math.min(310, Math.max(20, w * 0.38)));  // clear the detail panel
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      map.flyToBounds(mainBoundsByIso3.get(rec.iso3) || layer.getBounds(),
        { paddingTopLeft:[28,28], paddingBottomRight:[rightPad,28], maxZoom:6, duration:1.1, animate:!reduce });
    }
  }

  // Head-to-head card for a knockout match where both nations are placed.
  function getH2H(a, b) {
    return H2H_FACTS[h2hKey(a, b)] || null;
  }

  // ---- FIFA World Ranking (api.fifa.com — CORS-open, so loaded live) --------
  let fifaRanks = {};   // FIFA code -> { rank, pts }
  async function loadRankings() {
    try {
      const cached = JSON.parse(localStorage.getItem('wc-ranks') || 'null');
      if (cached && Date.now() - cached.t < CONFIG.rankTtlMs) { fifaRanks = cached.r; return; }
      // Latest men's ranking schedule (gender 1 = men, type 0), then its table.
      const sched = await (await fetch(`${CONFIG.fifaApi}/rankingschedules/all?type=0&gender=1`)).json();
      const latest = (sched.Results || []).slice()
        .sort((x, y) => (y.OfficialDate || '').localeCompare(x.OfficialDate || ''))[0];
      if (!latest) return;
      const rk = await (await fetch(`${CONFIG.fifaApi}/rankingsbyschedule?rankingScheduleId=${latest.IdRankingSchedule}&count=300`)).json();
      const map = {};
      for (const r of (rk.Results || [])) if (r.IdCountry) map[r.IdCountry] = { rank: r.Rank, pts: r.TotalPoints };
      fifaRanks = map;
      localStorage.setItem('wc-ranks', JSON.stringify({ t: Date.now(), r: map }));
    } catch (e) { console.warn('FIFA ranking load failed', e); }
  }
  const rankOf = (fifa) => (fifaRanks[fifa] || {}).rank || null;

  // ---- Head-to-head (pre-baked, bracket-driven — scripts/build_h2h.py) ------
  // FIFA's complete H2H is behind a bot-walled, non-CORS endpoint, so it can't be
  // fetched from the browser. We bake it (per knockout tie, as the bracket fills)
  // into h2h.json and load that here. Records are keyed by sorted FIFA codes and
  // oriented to the alphabetically-first code.
  let h2hData = null;          // { "A|B": record } once loaded
  let h2hReqId = 0;            // guards against out-of-order async renders
  async function loadH2H(force) {
    if (h2hData && !force) return h2hData;
    try { h2hData = await (await fetch(CONFIG.h2hData, { cache: 'no-cache' })).json(); }
    catch (e) { console.warn('H2H data load failed', e); h2hData = h2hData || {}; }
    return h2hData;
  }

  // Render the baked record, re-oriented to a = home/left, b = away/right.
  function renderH2HRecord(rec, a, b) {
    const aFirst = a.fifa < b.fifa;                       // rec is oriented to the lower code
    const wA = aFirst ? rec.w[0] : rec.w[2];
    const wB = aFirst ? rec.w[2] : rec.w[0];
    const gA = aFirst ? rec.g[0] : rec.g[1];
    const gB = aFirst ? rec.g[1] : rec.g[0];
    const wcA = aFirst ? rec.wc[0] : rec.wc[2];
    const wcB = aFirst ? rec.wc[2] : rec.wc[0];
    const wcD = rec.wc[1], wcN = rec.wc[3];
    const nameOf = (c) => c === a.fifa ? a.name : b.name;
    let lastLine = '';
    if (rec.last) {
      const L = rec.last, yr = (L.date || '').slice(0, 4);
      lastLine = `${nameOf(L.h)} ${L.hs}–${L.as} ${nameOf(L.a)}`;
      if (L.pen) {
        const win = Math.max(L.pen.hp, L.pen.ap), lose = Math.min(L.pen.hp, L.pen.ap);
        lastLine += ` <span class="h2h-pen">(${nameOf(L.pen.pw)} won ${win}–${lose} on pens)</span>`;
      }
      const ctx = [yr, L.comp].filter(Boolean).join(' · ');
      if (ctx) lastLine += ` <span class="h2h-tot">— ${ctx}</span>`;
    }
    const wc = wcN
      ? `<div class="h2h-row"><span class="k">World Cup</span><span><b>${wcA}–${wcD}–${wcB}</b>
           in ${wcN} ${wcN === 1 ? 'meeting' : 'meetings'}</span></div>` : '';
    return `<div class="h2h-rec">
        <div class="h2h-tot"><b>${rec.p}</b> ${rec.p === 1 ? 'meeting' : 'meetings'}
          · goals <b>${gA}–${gB}</b></div>
        <div class="h2h-wdl">
          <span><span class="nm">${a.name}</span> <span class="n">${wA}</span></span>
          <span class="d">${rec.w[1]} drawn</span>
          <span><span class="n">${wB}</span> <span class="nm">${b.name}</span></span>
        </div>
        ${wc}
        ${lastLine ? `<div class="h2h-row"><span class="k">Last met</span><span>${lastLine}</span></div>` : ''}
        <div class="h2h-src">Official FIFA head-to-head — all senior internationals.</div>
      </div>`;
  }

  const rankChip = (fifa) => { const r = rankOf(fifa); return r ? ` <span class="h2h-rk">#${r}</span>` : ''; };

  async function showH2H(homeId, awayId) {
    const a = teamsById.get(String(homeId)), b = teamsById.get(String(awayId));
    if (!a || !b) return;
    const fact = getH2H(a.fifa, b.fifa);
    const el = document.getElementById('h2h');
    el.innerHTML =
      `<button class="x" aria-label="Close">×</button>
       <div class="h2h-title">⚔ Head-to-head</div>
       <div class="h2h-teams"><img src="${a.flag}" alt=""><span>${a.name}${rankChip(a.fifa)}</span>
         <span class="vs">vs</span><span>${b.name}${rankChip(b.fifa)}</span><img src="${b.flag}" alt=""></div>
       ${fact ? `<div class="h2h-fact">${fact}</div>` : ''}
       <div class="h2h-live"><div class="h2h-loading">Loading FIFA record…</div></div>`;
    el.classList.add('open');

    const reqId = ++h2hReqId;
    const data = await loadH2H();
    if (reqId !== h2hReqId) return;                      // a newer card opened — drop this result
    const rec = data[h2hKey(a.fifa, b.fifa)];
    const live = el.querySelector('.h2h-live');
    if (!live) return;
    if (rec)       live.innerHTML = renderH2HRecord(rec, a, b);
    else if (fact) live.innerHTML = '';                  // curated fact already carries the story
    else live.innerHTML = `<div class="h2h-rec muted">FIFA head-to-head for this tie isn't in the
      data yet — it's added automatically once the matchup is set.</div>`;
  }
  function closeH2H() { const el = document.getElementById('h2h'); if (el) el.classList.remove('open'); }

  // Best third-placed-teams card (bracket page) — data from computeThirdPlace().
  function renderThirdPlace() {
    const el = document.getElementById('third');
    if (!thirdPlaceRanking.length) {
      el.innerHTML = `<button class="x" aria-label="Close">×</button>
        <div class="h2h-title">🥉 Best third-placed teams</div>
        <div class="tp-sub">The ranking fills in as group results land — check back once more groups finish.</div>`;
      return;
    }
    const row = (t, i) => {
      const team = teamsByFifa.get(t.fifa);
      return `<div class="tp-row ${t.qualifies ? 'q' : 'out'}">
        <span class="tp-rank">${i + 1}</span>
        <img src="${team ? team.flag : ''}" alt="">
        <span class="tp-name">${team ? team.name : t.fifa}</span>
        <span class="tp-grp">${t.group}</span>
        <span class="tp-num">${t.gp}</span>
        <span class="tp-num">${t.gd > 0 ? '+' : ''}${t.gd}</span>
        <span class="tp-pts">${t.pts}</span></div>`;
    };
    const rows = thirdPlaceRanking.map((t, i) =>
      row(t, i) + (i === 7 ? '<div class="tp-cut">qualification line · top 8 reach the Round of 32</div>' : '')).join('');
    el.innerHTML = `<button class="x" aria-label="Close">×</button>
      <div class="h2h-title">🥉 Best third-placed teams</div>
      <div class="tp-sub">The 12 group third-placed teams, ranked by points → goal difference. The top 8 join the
        12 group winners and 12 runners-up in the Round of 32.</div>
      <div class="tp-head"><span>#</span><span></span><span class="tp-nm">Team</span>
        <span>GRP</span><span>GP</span><span>GD</span><span>PTS</span></div>
      ${rows}
      <div class="tp-foot">Computed live from FIFA's official match feed. Exact order of tied teams may differ from
        FIFA's further tiebreakers (goals scored, disciplinary points, drawing of lots).</div>`;
  }
  function openThird() { renderThirdPlace(); closeH2H(); document.getElementById('third').classList.add('open'); }
  function closeThird() { const el = document.getElementById('third'); if (el) el.classList.remove('open'); }

  async function boot() {
    isDark = autoTheme();
    document.body.classList.toggle('theme-dark', isDark);
    initMap();
    document.getElementById('mapNote').textContent = 'Loading live data…';
    await loadData();
    updateBadge();
    renderSidebar();
    loadRankings().then(() => {            // ranking loads async (CORS-open) — repaint badges when ready
      renderSidebar();
      if (selectedId) { const row = document.querySelector(`#groups .team[data-id="${selectedId}"]`); if (row) row.classList.add('active'); }
      if (selectedId && teamsById.has(selectedId) && document.getElementById('detail').classList.contains('open'))
        renderDetail(teamsById.get(selectedId));
    });
    loadSquads();                          // warm the squad list (shown in the detail panel)
    loadSalaries();                        // warm the estimated wages shown alongside the squad
    await loadBoundaries();

    document.getElementById('search').addEventListener('input', e => filterSidebar(e.target.value));
    document.getElementById('resetBtn').addEventListener('click', resetView);
    const tb = document.getElementById('themeBtn');
    tb.textContent = isDark ? '☀️' : '🌙';
    tb.addEventListener('click', () => applyTheme(!isDark, true));
    document.getElementById('dClose').addEventListener('click', closeDetail);
    document.getElementById('mapThirdChip').addEventListener('click', openThird);   // 3rd-place race from the Map tab
    document.getElementById('refreshBtn').addEventListener('click', async () => {
      loadH2H(true);   // re-pull the baked H2H so newly-set ties / results show
      await loadData(); updateBadge(); renderSidebar(); restyleAll();
      if (document.body.classList.contains('view-bracket')) buildBracket();
      if (selectedId && teamsById.has(selectedId)) selectTeam(selectedId);
    });
    document.getElementById('colourSeg').addEventListener('click', e => {
      const btn = e.target.closest('button'); if (!btn) return;
      colourMode = btn.dataset.mode;
      document.querySelectorAll('#colourSeg button').forEach(b => b.classList.toggle('on', b===btn));
      restyleAll();
    });
    document.getElementById('viewSeg').addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return; setView(b.dataset.view);
    });
    document.getElementById('bracket-view').addEventListener('click', e => {
      if (e.target.closest('#thirdChip')) { openThird(); return; }
      const md = e.target.closest('.mdate.has-h2h');
      if (md) { const g = gamesById.get(md.dataset.h2h); if (g) { closeThird(); showH2H(g.homeId, g.awayId); } return; }
      const el = e.target.closest('.mteam.pick');
      if (el) { closeH2H(); closeThird(); bracketSelectTeam(el.dataset.team); return; }
      closeH2H(); closeThird();   // clicking the bracket backdrop dismisses the cards
    });
    document.getElementById('h2h').addEventListener('click', e => { if (e.target.closest('.x')) closeH2H(); });
    document.getElementById('third').addEventListener('click', e => { if (e.target.closest('.x')) closeThird(); });
    const board = document.getElementById('scorer-board');
    board.addEventListener('click', e => { const el = e.target.closest('.lb-row'); if (el) selectScorerNation(el.dataset.team); });
    board.addEventListener('keydown', e => { const el = e.target.closest('.lb-row'); if (el && (e.key==='Enter'||e.key===' ')) { e.preventDefault(); selectScorerNation(el.dataset.team); } });
    window.addEventListener('resize', () => { if (document.body.classList.contains('view-bracket')) drawConnectors(); });

    // Live auto-refresh: re-pull standings / fixtures / bracket every 60s, preserving the current view.
    setInterval(async () => {
      await loadData(); updateBadge(); renderSidebar();
      if (selectedId) { const row = document.querySelector(`#groups .team[data-id="${selectedId}"]`); if (row) row.classList.add('active'); }
      if (selectedId && teamsById.has(selectedId) && document.getElementById('detail').classList.contains('open'))
        renderDetail(teamsById.get(selectedId));
      if (document.body.classList.contains('view-bracket')) buildBracket();
      if (document.getElementById('third').classList.contains('open')) renderThirdPlace();
      if (document.body.classList.contains('view-scorers')) {
        buildLeaderboard();
        if (selectedId && document.getElementById('scorer-nation').classList.contains('open')) renderNationScorers(selectedId);
      }
    }, 60000);

    setView('bracket');   // land on the knockout bracket by default (data is loaded by now)

    trackVisit();   // increment + show the live page-view count (once per load)
  }

  // Free page-view counter (Abacus) — fire-and-forget; the badge stays hidden if the service is unavailable.
  async function trackVisit() {
    if (!CONFIG.visitorCounter) return;
    try {
      const r = await fetch(CONFIG.visitorCounter, { cache:'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const n = (await r.json()).value;
      if (typeof n === 'number') {
        document.getElementById('visitsText').textContent = n.toLocaleString('en-GB') + (n === 1 ? ' view' : ' views');
        document.getElementById('visits').style.display = '';
      }
    } catch (e) { console.warn('Visit counter unavailable.', e); }
  }
  boot();
  </script>
</body>
