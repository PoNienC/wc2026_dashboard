name: Refresh FIFA data

# Re-bakes the bracket-driven head-to-head (h2h.json) from FIFA's authoritative
# endpoint. Runs ~4x/day timed to WC2026 match-end windows (so new ties get their H2H
# soon after they form), on manual dispatch, and once whenever this workflow file
# changes (so it can be tested by pushing it). The FIFA ranking is NOT baked here —
# api.fifa.com is CORS-open, so the app loads the ranking live in the browser.
#
# NOTE: the H2H source (inside.fifa.com) sits behind Akamai bot protection. It works
# from a normal IP; if GitHub's runner IP gets challenged, the build step fails and
# no commit is made — fall back to running scripts/build_h2h.py locally (see HANDOVER).

on:
  schedule:
    # Every 2h across the WC2026 knockout match-end window. Kickoffs run 16:00-03:00 UTC, so
    # matches end ~18:00-06:00 UTC (a match + extra time + penalties + FIFA processing is ~2.5-3h).
    # Baking every 2h means any newly-set tie (and its winner's next-round H2H) is picked up within
    # ~2h of the final whistle. commit-if-changed means too-early/no-change runs just no-op.
    # (Scheduled runs fire on main only.) Revert to ~4x/day once the knockouts finish.
    - cron: '0 18 * * *'     # after ~16:00 kickoffs
    - cron: '0 20 * * *'     # after ~17:00-18:00 kickoffs
    - cron: '0 22 * * *'     # after ~19:00-20:00 kickoffs
    - cron: '0 0 * * *'      # after ~21:00-22:00 kickoffs
    - cron: '0 2 * * *'      # after ~23:00-00:00 kickoffs
    - cron: '0 4 * * *'      # after ~01:00-01:30 kickoffs (incl. extra time)
    - cron: '0 6 * * *'      # after ~03:00 kickoffs (incl. extra time + penalties)
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/refresh_fifa_data.yml'

permissions:
  contents: write

concurrency:
  group: refresh-fifa-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bake bracket-driven head-to-head
        run: python3 scripts/build_h2h.py

      - name: Bake FIFA goalscorers
        run: python3 scripts/build_scorers.py

      - name: Stamp refresh time
        run: |
          python3 - <<'PY'
          import json, datetime, pathlib
          h2h = pathlib.Path('h2h.json')
          pairs = len(json.loads(h2h.read_text())) if h2h.exists() else 0
          pathlib.Path('h2h.meta.json').write_text(
              json.dumps({'refreshed': datetime.datetime.utcnow().isoformat(timespec='seconds') + 'Z',
                          'pairs': pairs}, indent=2) + '\n')
          print(f'stamped: {pairs} pair(s)')
          PY

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add h2h.json h2h.meta.json scorers.json
          if git diff --cached --quiet; then
            echo 'No change — nothing to commit.'
          else
            git commit -m 'chore: refresh FIFA head-to-head + scorer data [skip ci]'
            git push
          fi
